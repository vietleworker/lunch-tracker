function t(k){return L[lang][k]||L.en[k]||k}

function toDateInput(ds){
  // Convert "08 May 2026" -> "2026-05-08"
  try{var d=new Date(ds);if(isNaN(d))return '';
  return d.getFullYear()+'-'+(d.getMonth()+1).toString().padStart(2,'0')+'-'+d.getDate().toString().padStart(2,'0');}
  catch(e){return '';}
}
function fromDateInput(ds){
  // Convert "2026-05-08" -> "08 May 2026"
  try{var d=new Date(ds+'T12:00:00');if(isNaN(d))return ds;
  return d.getDate().toString().padStart(2,'0')+' '+d.toLocaleString('en-US',{month:'short'})+' '+d.getFullYear();}
  catch(e){return ds;}
}

function fmt(n){return(n||0).toLocaleString('vi-VN')}
function fmtK(n){return n>=1000?Math.round(n/1000)+'k':fmt(n)}
function today(){var d=new Date();return d.getDate().toString().padStart(2,'0')+' '+d.toLocaleString('en-US',{month:'short'})+' '+d.getFullYear()}

function toInputDate(ds){
  // "08 May 2026" -> "2026-05-08"
  try{var d=new Date(ds);if(isNaN(d))return'';
  return d.getFullYear()+'-'+(d.getMonth()+1).toString().padStart(2,'0')+'-'+d.getDate().toString().padStart(2,'0');}
  catch(e){return'';}
}
function fromInputDate(v){
  // "2026-05-08" -> "08 May 2026"
  try{var d=new Date(v+'T12:00:00');if(isNaN(d))return v;
  return d.getDate().toString().padStart(2,'0')+' '+d.toLocaleString('en-US',{month:'short'})+' '+d.getFullYear();}
  catch(e){return v;}
}
function dayOfWeek(ds){try{
  if(!ds)return'';
  // Add T12:00 for ISO dates to avoid timezone issues
  var d=ds.match(/^\d{4}-\d{2}-\d{2}$/)?new Date(ds+'T12:00:00'):new Date(ds);
  if(isNaN(d))return'';
  var days=lang==='vi'?['CN','T2','T3','T4','T5','T6','T7']:['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  return days[d.getDay()];}catch(e){return'';}}

  if(!ds)return'';
  if(/^\d{4}-\d{2}-\d{2}$/.test(ds))return ds;
  try{var d=new Date(ds);if(!isNaN(d))return d.getFullYear()+'-'+(d.getMonth()+1).toString().padStart(2,'0')+'-'+d.getDate().toString().padStart(2,'0');}catch(e){}
  return ds;
}
function displayDate(ds){
  // Show any date as "11 May 2026"
  if(!ds)return'';
  var d=ds.match(/^\d{4}-\d{2}-\d{2}$/)?new Date(ds+'T12:00:00'):new Date(ds);
  if(isNaN(d))return ds;
  return d.getDate().toString().padStart(2,'0')+' '+d.toLocaleString('en-US',{month:'short'})+' '+d.getFullYear();
}

function paymentsForBill(bill){
  var billNorm=normDate(bill.date);
  if(!billNorm)return[];
  return payments.filter(function(p){
    var covers=p.covers||p.date||'';
    return normDate(covers)===billNorm;
  });
}

function getWeekKey(dateStr){
  try{var d=dateStr&&dateStr.match(/^\d{4}-\d{2}-\d{2}$/)?new Date(dateStr+'T12:00:00'):new Date(dateStr);if(isNaN(d))return'other';
  var now=new Date();var startOfWeek=new Date(now);startOfWeek.setDate(now.getDate()-now.getDay());startOfWeek.setHours(0,0,0,0);
  var endOfWeek=new Date(startOfWeek);endOfWeek.setDate(startOfWeek.getDate()+7);
  var lastWeekStart=new Date(startOfWeek);lastWeekStart.setDate(startOfWeek.getDate()-7);
  if(d>=startOfWeek&&d<endOfWeek)return'thisWeek';
  if(d>=lastWeekStart&&d<startOfWeek)return'lastWeek';
  return'earlier';}catch(e){return'other';}
}

function compressImage(file,maxW,quality){
  return new Promise(function(resolve,reject){var reader=new FileReader();
    reader.onload=function(e){var img=new Image();img.onload=function(){
      var w=img.width,h=img.height;if(w>maxW){h=Math.round(h*maxW/w);w=maxW;}
      var c=document.createElement('canvas');c.width=w;c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      try{resolve(c.toDataURL('image/jpeg',quality));}catch(err){reject(err);}
    };img.onerror=function(){reject(new Error('fail'));};img.src=e.target.result;};
    reader.onerror=function(){reject(new Error('fail'));};reader.readAsDataURL(file);});
}

function calcMemberBalances(){
  var status={};
  members.forEach(function(m){status[m.en]={unpaidDates:[],paidDates:[],totalPaid:0,totalOwed:0};});
  
  // Only count payments for THIS WEEK's bills
  var thisWeekBills=bills.filter(function(b){return getWeekKey(b.date)==='thisWeek';});
  var thisWeekDates={};
  thisWeekBills.forEach(function(b){thisWeekDates[normDate(b.date)]=true;});
  
  // Only count payments that match this week's bills
  payments.forEach(function(p){
    if(!status[p.en])return;
    var cn=normDate(p.covers||p.date);
    if(thisWeekDates[cn])status[p.en].totalPaid+=(p.amount||0);
  });

  thisWeekBills.forEach(function(bill){
    var billItems=bill.items||[];if(!billItems.length)return;
    var bp=paymentsForBill(bill);
    var paidNames={};bp.forEach(function(p){paidNames[p.en]=true;});
    var numItems=billItems.length;
    var estPerPerson=numItems>0?Math.round((bill.total||0)/numItems):0;
    var shortDate=displayDate(bill.date).replace(' 2026','').replace(' 2025','');
    billItems.forEach(function(item){
      if(!status[item.en])status[item.en]={unpaidDates:[],paidDates:[],totalPaid:0,totalOwed:0};
      var itemAmt=item.price>0?item.price:estPerPerson;
      if(paidNames[item.en]){
        status[item.en].paidDates.push(shortDate);
      }else{
        status[item.en].unpaidDates.push(shortDate);
        status[item.en].totalOwed+=itemAmt;
      }
    });
  });
  return status;
}


function calcMemberStats(){
  var stats={};
  var thisWeekBills=bills.filter(function(b){return getWeekKey(b.date)==='thisWeek';});
  var totalBillDays=thisWeekBills.length;
  var balances=calcMemberBalances();

  members.forEach(function(m){
    var en=m.en;
    var myPayments=payments.filter(function(p){return p.en===en;});
    var bal=balances[en]||{unpaidDates:[],paidDates:[],totalPaid:0,totalOwed:0};

    var daysEaten=0;
    thisWeekBills.forEach(function(b){
      var items=b.items||[];
      if(items.some(function(it){return it.en===en;}))daysEaten++;
    });

    var prices=[];var dishCount={};
    bills.forEach(function(b){
      (b.items||[]).forEach(function(it){
        if(it.en===en){
          if(it.price>0)prices.push(it.price);
          if(it.dish){var d=it.dish.toLowerCase().trim();if(d)dishCount[d]=(dishCount[d]||0)+1;}
        }
      });
    });
    var avgMeal=prices.length?Math.round(prices.reduce(function(s,p){return s+p;},0)/prices.length):0;

    var favDish='',favCount=0;
    Object.keys(dishCount).forEach(function(d){if(dishCount[d]>favCount){favCount=dishCount[d];favDish=d;}});

    var speedScores=[];
    thisWeekBills.forEach(function(b){
      var items=b.items||[];
      if(!items.some(function(it){return it.en===en;}))return;
      var billNorm=normDate(b.date);
      var matchPay=myPayments.find(function(p){return normDate(p.covers||p.date)===billNorm;});
      if(matchPay){
        var billD=new Date(billNorm+'T12:00:00');
        var payD=matchPay.createdAt?(matchPay.createdAt.toDate?matchPay.createdAt.toDate():new Date(matchPay.createdAt)):billD;
        var diffDays=Math.max(0,Math.round((payD-billD)/(1000*60*60*24)));
        if(diffDays<=0)speedScores.push(5);
        else if(diffDays<=1)speedScores.push(4);
        else if(diffDays<=2)speedScores.push(3);
        else if(diffDays<=3)speedScores.push(2);
        else speedScores.push(1);
      }
    });
    var avgSpeed=speedScores.length?Math.round(speedScores.reduce(function(s,v){return s+v;},0)/speedScores.length):0;

    stats[en]={
      totalPaid:bal.totalPaid,totalOwed:bal.totalOwed,
      unpaidDates:bal.unpaidDates,
      daysEaten:daysEaten,totalBillDays:totalBillDays,
      avgMeal:avgMeal,avgSpeed:avgSpeed,
      favDish:favDish,favCount:favCount,
      payCount:myPayments.length
    };
  });
  return stats;
}

function getUnmatchedPayments(){
  var billDates={};bills.forEach(function(b){billDates[normDate(b.date)]=true;});
  return payments.filter(function(p){return!billDates[normDate(p.covers||p.date)];});
}

  var sorted=bills.slice().sort(function(a,b){
    try{return new Date(b.date).getTime()-new Date(a.date).getTime();}catch(e){return 0;}
  });
  var groups={thisWeek:[],lastWeek:[],earlier:[]};
  sorted.forEach(function(b){var wk=getWeekKey(b.date);(groups[wk]||groups.earlier).push(b);});
  // Within each group: sort by day of week, Friday (5) first → Mon (1) last
  var DOW_ORDER={5:0,4:1,3:2,2:3,1:4,6:5,0:6};
  function sortByDow(arr){return arr.sort(function(a,b){
    var da=new Date(a.date),db=new Date(b.date);
    if(isNaN(da)||isNaN(db))return 0;
    var diff=DOW_ORDER[da.getDay()]-DOW_ORDER[db.getDay()];
    return diff!==0?diff:db.getTime()-da.getTime(); // same DOW → newer first
  });}
  Object.keys(groups).forEach(function(k){sortByDow(groups[k]);});

  // Helper: get week date range
  function getWeekRange(key){
    var now=new Date();var s=new Date(now);s.setDate(now.getDate()-now.getDay()+1);s.setHours(0,0,0,0);// Monday
    var e=new Date(s);e.setDate(s.getDate()+4);// Friday
    if(key==='lastWeek'){s.setDate(s.getDate()-7);e.setDate(e.getDate()-7);}
    else if(key==='earlier')return'';
    var fmt2=function(d){return d.getDate()+' '+d.toLocaleString('en-US',{month:'short'});};
    return fmt2(s)+' - '+fmt2(e);
  }

  // Helper: build weekly summary
  function weekSummary(weekBills){
    var totalBill=0,totalRec=0,allItems=[],pplSet={};
    weekBills.forEach(function(b){
      totalBill+=(b.total||0);
      var bp=paymentsForBill(b);totalRec+=bp.reduce(function(s,p){return s+(p.amount||0);},0);
      (b.items||[]).forEach(function(it){
        allItems.push(it);pplSet[it.en]=true;
      });
    });
    var pplCount=Object.keys(pplSet).length;
    // Most expensive / cheapest eater — aggregate per person first
    var pplSpend={};
    allItems.forEach(function(it){
      if(it.price>0&&it.en){
        pplSpend[it.en]=(pplSpend[it.en]||0)+it.price;
      }
    });
    var maxPrice=0,minPrice=Infinity,maxNames=[],minNames=[];
    Object.keys(pplSpend).forEach(function(en){
      var p=pplSpend[en];
      if(p>maxPrice){maxPrice=p;maxNames=[en];}
      else if(p===maxPrice)maxNames.push(en);
      if(p<minPrice){minPrice=p;minNames=[en];}
      else if(p===minPrice)minNames.push(en);
    });
    var maxItem=maxNames.length?{en:maxNames.join(' & '),price:maxPrice}:null;
    var minItem=minNames.length&&minPrice!==maxPrice?{en:minNames.join(' & '),price:minPrice}:null;
    // Most popular dish
    var dishCnt={};allItems.forEach(function(it){if(it.dish){var d=it.dish.trim();if(d)dishCnt[d]=(dishCnt[d]||0)+1;}});
    var topDish='',topDishCnt=0;Object.keys(dishCnt).forEach(function(d){if(dishCnt[d]>topDishCnt){topDishCnt=dishCnt[d];topDish=d;}});

    var h='<div class="bg-surface-white rounded-xl shadow-card border border-outline-v/20 p-4 mb-4">';
    h+='<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;text-align:center">';
    h+='<div><div class="text-[10px] text-txt3 font-bold" style="text-transform:uppercase;letter-spacing:.5px">Total bills</div><div class="text-lg font-bold">'+fmt(totalBill)+'<span class="text-xs text-txt3">&#273;</span></div></div>';
    h+='<div><div class="text-[10px] text-txt3 font-bold" style="text-transform:uppercase;letter-spacing:.5px">Collected</div><div class="text-lg font-bold" style="color:#059669">'+fmt(totalRec)+'<span class="text-xs text-txt3">&#273;</span></div></div>';
    h+='<div><div class="text-[10px] text-txt3 font-bold" style="text-transform:uppercase;letter-spacing:.5px">Outstanding</div><div class="text-lg font-bold" style="color:#dc2626">'+fmt(totalBill-totalRec)+'<span class="text-xs text-txt3">&#273;</span></div></div>';
    h+='<div><div class="text-[10px] text-txt3 font-bold" style="text-transform:uppercase;letter-spacing:.5px">People</div><div class="text-lg font-bold">'+pplCount+'</div></div>';
    h+='</div>';
    // Fun stats row
    var funStats=[];
    if(maxItem)funStats.push('<span class="mi" style="font-size:13px;color:#dc2626">local_fire_department</span> <b>'+esc(maxItem.en)+'</b> ate priciest ('+fmtK(maxItem.price)+')');
    if(minItem&&minItem.en!==( maxItem?maxItem.en:''))funStats.push('<span class="mi" style="font-size:13px;color:#059669">eco</span> <b>'+esc(minItem.en)+'</b> ate cheapest ('+fmtK(minItem.price)+')');
    if(topDish)funStats.push('<span class="mi" style="font-size:13px;color:#d97706">restaurant</span> Popular: <b>'+esc(topDish)+'</b> ('+topDishCnt+'x)');
    if(funStats.length){
      h+='<div style="border-top:1px solid #f0f0f0;margin-top:10px;padding-top:8px;display:flex;flex-wrap:wrap;gap:8px 16px;font-size:11px;color:#737373">';
      funStats.forEach(function(s){h+='<div>'+s+'</div>';});
      h+='</div>';
    }
    h+='</div>';
    return h;
  }

  var html='<div class="space-y-6">';
  [{key:'thisWeek',label:t('thisWeek')},{key:'lastWeek',label:t('lastWeek')},{key:'earlier',label:t('earlier')}].forEach(function(g){
    if(!groups[g.key].length)return;
    var open=weekState[g.key]!==false;
    var range=getWeekRange(g.key);
    html+='<section><button onclick="toggleWeek(\''+g.key+'\')" class="flex items-center gap-2 w-full text-left mb-3 p-2 rounded-lg hover:bg-surface-low transition-colors group"><span class="mi text-txt3 group-hover:text-primary transition-colors">'+(open?'expand_more':'chevron_right')+'</span><h2 class="text-title font-bold uppercase tracking-wide">'+g.label+(range?' <span class="text-body-sm text-txt3 font-normal normal-case">('+range+')</span>':'')+'</h2></button>';
    if(open){
      html+=weekSummary(groups[g.key]);
      html+='<div class="space-y-4">';
      groups[g.key].forEach(function(bill){
        var bp=paymentsForBill(bill);var received=bp.reduce(function(s,p){return s+(p.amount||0)},0);
        var total=bill.total||0;var pct=total>0?Math.min(100,Math.round(received/total*100)):0;
        var short_=total-received;var dow=dayOfWeek(bill.date);
        var paidNames={};bp.forEach(function(p){paidNames[p.en]=true;});
        var notPaid=members.filter(function(m){return!paidNames[m.en]}).map(function(m){return m.en});
        var isPaid=pct>=100;var progColor=pct<30?'bg-error':pct<70?'bg-tertiary-c':'bg-secondary';
        html+='<div class="bg-surface-white rounded-xl shadow-card border border-outline-v/20 overflow-hidden">';
        html+='<div class="p-5 border-b border-outline-v/30"><div class="flex justify-between items-start gap-4 cursor-pointer" data-eb="'+bill.id+'"><div><div class="flex items-center gap-2 mb-1"><span class="text-label font-bold text-txt3 bg-surface-low px-2 py-1 rounded uppercase">'+(dow||'')+'</span><span class="text-body-sm text-txt3">'+displayDate(bill.date)+'</span></div><div class="text-headline text-primary font-semibold">'+esc(bill.note||'--')+'</div></div><div class="text-right"><div class="text-2xl font-bold tabular-nums">'+fmt(total)+'<span class="text-title ml-1">&#273;</span></div>';
        html+='<div class="mt-1"><span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-label '+(isPaid?'bg-secondary-c/20 text-secondary-on':'bg-tertiary-bg text-tertiary')+'""><span class="mi text-[14px]">'+(isPaid?'check_circle':'sync')+'</span>'+(isPaid?t('fullyPaid'):t('collecting'))+'</span></div>';
        html+='</div></div></div>';
        if(bill.photoData)html+='<img src="'+bill.photoData+'" class="w-full max-h-48 object-cover cursor-pointer" onclick="showLightbox(this.src)"/>';
        // Daily mini-summary
        (function(){
          var di=bill.items||[];
          if(!di.length)return;
          var dSpend={};
          di.forEach(function(it){if(it.price>0&&it.en)dSpend[it.en]=(dSpend[it.en]||0)+it.price;});
          var dMax=0,dMin=Infinity,dMaxNames=[],dMinNames=[];
          Object.keys(dSpend).forEach(function(en){
            var p=dSpend[en];
            if(p>dMax){dMax=p;dMaxNames=[en];}else if(p===dMax)dMaxNames.push(en);
            if(p<dMin){dMin=p;dMinNames=[en];}else if(p===dMin)dMinNames.push(en);
          });
          var dDishCnt={};di.forEach(function(it){if(it.dish){var d=it.dish.trim();if(d)dDishCnt[d]=(dDishCnt[d]||0)+1;}});
          var dTopDish='',dTopCnt=0;Object.keys(dDishCnt).forEach(function(d){if(dDishCnt[d]>dTopCnt){dTopCnt=dDishCnt[d];dTopDish=d;}});
          var stats=[];
          if(dMaxNames.length)stats.push('<span class="mi" style="font-size:12px;color:#dc2626">local_fire_department</span><b>'+esc(dMaxNames.join(' & '))+'</b> ('+fmtK(dMax)+')');
          if(dMinNames.length&&dMin!==dMax)stats.push('<span class="mi" style="font-size:12px;color:#059669">eco</span><b>'+esc(dMinNames.join(' & '))+'</b> ('+fmtK(dMin)+')');
          if(dTopDish)stats.push('<span class="mi" style="font-size:12px;color:#d97706">restaurant</span><b>'+esc(dTopDish)+'</b> ('+dTopCnt+'x)');
          if(stats.length){
            html+='<div style="background:#f8f9fc;border-bottom:1px solid #eaedf2;padding:8px 20px;display:flex;flex-wrap:wrap;gap:4px 16px;font-size:11px;color:#525252">';
            stats.forEach(function(s){html+='<span style="display:inline-flex;align-items:center;gap:3px">'+s+'</span>';});
            html+='</div>';
          }
        })();
        html+='<div class="p-5"><div class="grid grid-cols-1 md:grid-cols-2 gap-6">';
        
        // Left column: Items list or Paid list
        var billItems=bill.items||[];
        if(billItems.length){
          html+='<div><h3 class="text-sm font-semibold text-txt2 mb-2 flex items-center gap-1"><span class="mi text-[16px]">group</span>'+t('orderDetails')+' ('+billItems.length+')</h3><div class="space-y-1">';
          billItems.forEach(function(item){
            var m=memberByEn(item.en);var bg=m?m.bg:'#e6e8ea',fg=m?m.fg:'#424656';
            var hasPaid=paidNames[item.en];
            var existingPayment=hasPaid?bp.find(function(p){return p.en===item.en}):null;
            if(hasPaid){
              // Paid: show green, click to edit payment
              html+='<div class="flex justify-between items-center text-sm py-1.5 px-2 rounded-lg cursor-pointer hover:bg-surface-low transition-colors" data-ep="'+(existingPayment?existingPayment.id:'')+'">';
            }else{
              // Unpaid: show red, click to quick-add payment
              html+='<div class="flex justify-between items-center text-sm py-1.5 px-2 rounded-lg bg-error-c/15 cursor-pointer hover:bg-error-c/25 transition-colors active:scale-[.98]" data-qp="1" data-en="'+esc(item.en)+'" data-date="'+esc(bill.date)+'" data-price="'+(item.price||0)+'">';
            }
            html+='<div class="flex items-center gap-2"><div class="w-6 h-6 rounded-full flex items-center justify-center text-[9px] font-bold" style="background:'+bg+';color:'+fg+'">'+initials(item.en)+'</div>';
            html+='<div><span class="font-medium">'+esc(item.en)+'</span>';
            if(item.dish)html+='<span class="text-xs text-txt3 ml-1">('+esc(item.dish)+')</span>';
            html+='</div></div>';
            html+='<div class="flex items-center gap-2">';
            if(hasPaid&&existingPayment)html+='<span class="text-xs font-semibold text-secondary">'+fmtK(existingPayment.amount)+'</span>';
            else if(!hasPaid&&item.price)html+='<span class="text-xs text-txt3">'+fmtK(item.price)+'</span>';
            if(!hasPaid)html+='<span class="text-[10px] font-bold text-error bg-error-c/30 px-1.5 py-0.5 rounded">'+t('unpaid')+'</span>';
            html+='<span class="mi text-[16px] '+(hasPaid?'text-secondary':'text-error')+'">'+(hasPaid?'check_circle':'add_circle')+'</span>';
            html+='</div></div>';
          });
          html+='</div></div>';
        }else if(bp.length){
          // Fallback: show payments
          html+='<div><h3 class="text-sm font-semibold text-secondary mb-2 flex items-center gap-1"><span class="mi text-[16px]">payments</span>'+t('paid')+' ('+bp.length+')</h3><div class="space-y-1">';
          bp.forEach(function(p){var m=memberByEn(p.en);var bg=m?m.bg:'#e6e8ea',fg=m?m.fg:'#424656';
            html+='<div class="flex justify-between items-center text-sm py-1 cursor-pointer" data-ep="'+p.id+'"><div class="flex items-center gap-2"><div class="w-6 h-6 rounded-full flex items-center justify-center text-[9px] font-bold" style="background:'+bg+';color:'+fg+'">'+initials(p.en)+'</div><span>'+esc(p.en)+'</span></div><span class="font-semibold text-secondary">'+fmtK(p.amount)+'</span></div>';});
          html+='</div></div>';
        }
        // Summary
        html+='<div class="bg-surface-low p-4 rounded-xl"><div class="flex justify-between mb-1 text-sm"><span class="text-txt3">'+t('billTotal')+'</span><span class="font-bold">'+fmt(total)+'&#273;</span></div><div class="flex justify-between mb-1 text-sm"><span class="text-secondary">'+t('received')+'</span><span class="font-bold text-secondary">'+fmt(received)+'&#273;</span></div>';
        if(short_>0)html+='<div class="flex justify-between mb-1 text-sm border-t border-outline-v/30 pt-1 mt-1"><span class="text-error font-semibold">'+t('balance')+'</span><span class="font-bold text-error">'+fmt(-short_)+'&#273;</span></div>';
        html+='<div class="prog mt-2"><div class="prog-bar '+progColor+'" style="width:'+pct+'%"></div></div></div></div>';
        // Not yet paid - use items if available, else fallback to all members
        var unpaidList;
        if(billItems.length){unpaidList=billItems.filter(function(it){return!paidNames[it.en]}).map(function(it){return it.en});}
        else{unpaidList=notPaid;}
        if(unpaidList.length)html+='<div class="px-5 py-3 bg-error-c/20 border-t border-error-c/30 text-sm text-error-on"><span class="font-bold">'+t('notYetPaid')+' ('+unpaidList.length+'):</span> '+esc(unpaidList.join(', '))+'</div>';
        html+='</div>';
      });
      html+='</div>';}
    html+='</section>';
  });
  html+='</div>';return html;
}
function toggleWeek(k){weekState[k]=weekState[k]===false?true:false;renderAll();}

var pFilter={name:'',week:'',date:''};

function renderPayments(){
  if(!payments.length)return'<div class="text-center text-txt3 py-12">'+t('noData')+'</div>';

  // Filter bar
  var memberOpts='<option value="">'+t('allMembers')+'</option>';

    '<option value="lastWeek"'+(pFilter.week==='lastWeek'?' selected':'')+'>'+t('lastWeek')+'</option>'+
    '<option value="earlier"'+(pFilter.week==='earlier'?' selected':'')+'>'+t('earlier')+'</option>'+
    '</select></div>'+
    '<div class="relative"><span class="mi absolute left-3 top-1/2 -translate-y-1/2 text-txt3 text-[18px]">calendar_today</span>'+

    (pFilter.name||pFilter.week||pFilter.date?'<button onclick="clearPFilter()" class="flex items-center gap-1 px-3 py-2 bg-error-c/20 text-error rounded-lg text-sm font-semibold hover:bg-error-c/30 transition-colors"><span class="mi text-[16px]">close</span>'+t('clearFilter')+'</button>':'')+

    html+='<div class="grid grid-cols-1 md:grid-cols-12 gap-2 md:gap-3 p-4 border-b border-outline-v/20 hover:bg-surface-low/50 transition-colors items-center cursor-pointer" data-ep2="'+p.id+'">';

  });
  html+='</div>';return html;
}

function pickColor(i){
  document.getElementById('mm-bg').value=COLORS[i].bg;
  document.getElementById('mm-fg').value=COLORS[i].fg;
  var prev=document.getElementById('mm-preview');
  prev.style.background=COLORS[i].bg;prev.style.color=COLORS[i].fg;
  // Update ring on buttons
  var btns=document.querySelectorAll('#mf button[onclick^="pickColor"]');
  btns.forEach(function(b,j){b.className=b.className.replace(/ring-2 ring-primary ring-offset-2/g,'');if(j===i)b.className+=' ring-2 ring-primary ring-offset-2';});
  if(memberModal)memberModal.data=Object.assign(memberModal.data||{},{bg:COLORS[i].bg,fg:COLORS[i].fg});
}

function updateMemberPreview(){
  var en=document.querySelector('#mf input[name=en]').value;
  var vn=document.querySelector('#mf input[name=vn]').value;
  var prev=document.getElementById('mm-preview');
  if(prev)prev.textContent=(en||'?').slice(0,2).toUpperCase();
  var pn=document.getElementById('mm-preview-name');if(pn)pn.textContent=vn||en||'Name';
  var ps=document.getElementById('mm-preview-sub');if(ps)ps.textContent=en||'English';
}

function closeMemberModal(){memberModal=null;document.getElementById('modal-host').innerHTML='';}

function handleMemberSubmit(e){
  e.preventDefault();var fd=new FormData(e.target);
  var payload={en:fd.get('en'),vn:fd.get('vn'),bg:fd.get('bg'),fg:fd.get('fg')};
  if(memberModal.mode==='edit'){
    db.collection('members').doc(memberModal.data.id).update(payload).then(closeMemberModal).catch(function(err){alert(err.message);});
  }else{
    payload.order=members.length+1;
    db.collection('members').add(payload).then(closeMemberModal).catch(function(err){alert(err.message);});
  }
}

function deleteMember(){
  if(!memberModal||!memberModal.data)return;
  if(!confirm(t('deleteMember')+'?'))return;
  db.collection('members').doc(memberModal.data.id).delete().then(closeMemberModal).catch(function(err){alert(err.message);});
}

  document.getElementById('sbg').onclick=function(e){if(e.target.id==='sbg')document.getElementById('modal-host').innerHTML='';};

function doChangePass(e){
  e.preventDefault();
  var np=document.getElementById('cp-new').value,cp=document.getElementById('cp-cfm').value;
  var err=document.getElementById('cp-err'),ok=document.getElementById('cp-ok');
  err.style.display='none';ok.style.display='none';
  if(np!==cp){err.textContent=t('passMismatch');err.style.display='block';return;}
  if(np.length<4){err.textContent='Min 4 characters';err.style.display='block';return;}
  db.doc('meta/auth').set({pass:np}).then(function(){ok.style.display='block';document.getElementById('cp-new').value='';document.getElementById('cp-cfm').value='';})
  .catch(function(ex){err.textContent=ex.message;err.style.display='block';});
}

function closeQuickPayment(){document.getElementById('modal-host').innerHTML='';}

function submitQuickPayment(e,en,vn){
  e.preventDefault();var fd=new FormData(e.target);
  var coversDate=fromInputDate(fd.get('covers'));
  var coversNorm=normDate(coversDate);
  var btn=e.target.querySelector('button[type=submit]');if(btn)btn.disabled=true;
  
  // Check for existing payment (prevent duplicate)
  var existing=payments.find(function(p){return p.en===en&&normDate(p.covers||p.date)===coversNorm;});
  if(existing){
    if(!confirm(en+' already paid '+fmt(existing.amount)+'d for '+displayDate(coversDate)+'. Add another payment?')){
      if(btn)btn.disabled=false;return;
    }
  }
  
  var payload={en:en,vn:vn,amount:parseInt(fd.get('amount'))||0,covers:coversDate,method:fd.get('method')||'Bank Transfer',date:today(),createdAt:new Date()};
  db.collection('payments').add(payload)
    .then(function(){closeQuickPayment();})
    .catch(function(err){alert(err.message);if(btn)btn.disabled=false;});
}

var shopModal=null;
function openShopModal(id){
  if(!isAdmin){openLoginModal();return;}
  if(id){
    var s=shops.find(function(x){return x.id===id;});
    var copyItems=(s.items||[]).map(function(i){return {dish:i.dish,price:i.price};});
    shopModal={mode:'edit',data:{id:s.id,name:s.name,items:copyItems}};
  }else{
    shopModal={mode:'add',data:{name:'',items:[{dish:'',price:0}]}};
  }
  renderShopModal();
}
function closeShopModal(){shopModal=null;document.getElementById('modal-host').innerHTML='';renderAll();}
function syncShopForm(){
  if(!shopModal)return;
  var form=document.getElementById('shopForm');
  if(!form)return;
  var fd=new FormData(form);
  shopModal.data.name=fd.get('shopname')||'';
  var items=[];
  for(var i=0;i<100;i++){
    var dish=fd.get('sdish_'+i);if(dish===null)break;
    var price=parseInt(fd.get('sprice_'+i))||0;
    items.push({dish:dish,price:price});
  }
  shopModal.data.items=items;
}
function addShopItem(){syncShopForm();shopModal.data.items.push({dish:'',price:0});renderShopModal();}
function removeShopItem(idx){syncShopForm();shopModal.data.items.splice(idx,1);renderShopModal();}

function renderShopModal(){
  if(!shopModal)return;
  var d=shopModal.data;var isEdit=shopModal.mode==='edit';
  var itemsHtml='';
  (d.items||[]).forEach(function(it,i){
    itemsHtml+='<div class="flex gap-2 items-center mb-2"><input name="sdish_'+i+'" value="'+esc(it.dish)+'" placeholder="Dish name" class="flex-1 bg-surface-low border border-outline-v/50 rounded-lg py-1.5 px-2 text-sm"/><div class="relative w-28"><input name="sprice_'+i+'" type="number" value="'+(it.price||'')+'" placeholder="0" class="w-full bg-surface-low border border-outline-v/50 rounded-lg py-1.5 px-2 text-sm text-right"/><span class="absolute right-2 top-1/2 -translate-y-1/2 text-[10px] text-txt3">\u0111</span></div><button type="button" onclick="removeShopItem('+i+')" class="text-error text-lg font-bold w-6 h-6 flex items-center justify-center">&times;</button></div>';
  });
  var html='<div class="fixed inset-0 bg-black/40 backdrop-blur-sm z-[100] flex items-center justify-center p-4" onclick="if(event.target===this)closeShopModal()"><div class="bg-surface-white w-full max-w-[420px] rounded-[20px] shadow-modal flex flex-col overflow-hidden max-h-[90vh]" onclick="event.stopPropagation()"><div class="flex items-center justify-between px-6 py-4 border-b border-outline-v/30"><h2 class="text-title font-bold">'+(isEdit?t('editShop'):t('addShop'))+'</h2><button onclick="closeShopModal()" class="w-8 h-8 rounded-full hover:bg-surface-low flex items-center justify-center text-txt3"><span class="mi text-[20px]">close</span></button></div><form id="shopForm" class="px-6 py-4 overflow-y-auto flex-1"><div class="mb-4"><label class="text-label font-bold text-txt3 uppercase tracking-wider block mb-1">'+t('shopName')+'</label><input name="shopname" value="'+esc(d.name)+'" required class="w-full bg-surface-low border border-outline-v/50 rounded-xl px-4 py-2 text-sm"/></div><div><label class="text-label font-bold text-txt3 uppercase tracking-wider block mb-2">'+t('menuItems')+'</label>'+itemsHtml+'<button type="button" onclick="addShopItem()" class="text-xs text-primary font-bold flex items-center gap-1 mt-1"><span class="mi text-[14px]">add</span>'+t('addDish')+'</button></div></form><div class="px-6 py-4 border-t border-outline-v/30 flex justify-end gap-3"><button type="button" onclick="closeShopModal()" class="px-4 py-2 rounded-lg text-primary border border-outline-v/30 text-sm font-semibold">'+t('cancel')+'</button>'+(isEdit?'<button type="button" onclick="deleteShop()" class="px-4 py-2 rounded-lg text-error border border-error-c text-sm font-semibold">'+t('delete')+'</button>':'')+'<button type="submit" form="shopForm" class="px-4 py-2 rounded-lg bg-primary-c text-white text-sm font-semibold">'+t('saveShop')+'</button></div></div></div>';
  document.getElementById('modal-host').innerHTML=html;
  document.getElementById('shopForm').onsubmit=function(e){
    e.preventDefault();
    var fd=new FormData(e.target);
    var name=fd.get('shopname')||'';
    var items=[];
    for(var i=0;i<100;i++){
      var dish=fd.get('sdish_'+i);if(dish===null)break;
      var price=parseInt(fd.get('sprice_'+i))||0;
      if(dish.trim())items.push({dish:dish.trim(),price:price});
    }
    var payload={name:name,items:items};
    var op;
    if(isEdit)op=db.collection('shops').doc(shopModal.data.id).update(payload);
    else{payload.createdAt=new Date();op=db.collection('shops').add(payload);}
    op.then(closeShopModal).catch(function(err){alert(err.message);});
  };
}
function deleteShop(){
  if(!shopModal||!shopModal.data.id)return;
  if(!confirm(t('delete')+'?'))return;
  db.collection('shops').doc(shopModal.data.id).delete().then(closeShopModal).catch(function(err){alert(err.message);});
}

function handleSubmit(e){
  e.preventDefault();if(saving||compressing)return;saving=true;
  var fd=new FormData(e.target);var payload,coll;
  if(modal.type==='bill'){
    coll='bills';payload={date:fd.get('date'),total:parseInt(fd.get('total'))||0,note:fd.get('note')||'',shop:fd.get('shop')||''};
    // Collect member items
    var items=[];var sortedM=members.slice().sort(function(a,b){return(a.order||99)-(b.order||99)});
    sortedM.forEach(function(m,idx){
      var cb=document.querySelector('[data-mi="'+idx+'"]');
      if(cb&&cb.checked){
        var dish=fd.get('dish_'+idx)||'';var price=parseInt(fd.get('price_'+idx))||0;
        items.push({en:m.en,dish:dish,price:price});
      }
    });
    payload.items=items; // always save, empty array = no items
  }else{
    coll='payments';var parts=(fd.get('member')||'|').split('|');
    payload={en:parts[0],vn:parts[1]||'',amount:parseInt(fd.get('amount'))||0,covers:fromDateInput(fd.get('covers')),method:fd.get('method')||'Bank Transfer',date:fromDateInput(fd.get('date'))};
  }
  if(pendingPhoto)payload.photoData=pendingPhoto;
  else if(modal.mode==='edit'&&modal.data.photoData&&!pendingPhoto)payload.photoData=firebase.firestore.FieldValue.delete();
  renderModal();var op;
  if(modal.mode==='edit')op=db.collection(coll).doc(modal.data.id).update(payload);
  else{payload.createdAt=new Date();op=db.collection(coll).add(payload);}
  op.then(function(){saving=false;closeModal();}).catch(function(err){alert(err.message);saving=false;renderModal();});
}

/* ── Member item toggles ── */
function toggleMemberItem(idx){
  var cb=document.querySelector('[data-mi="'+idx+'"]');
  var fields=document.getElementById('mi-fields-'+idx);
  var card=document.getElementById('mi-'+idx);
  if(cb&&fields&&card){
    if(cb.checked){
      fields.classList.remove('hidden');
      card.style.border='2px solid #0066ff';
      card.style.background='rgba(0,102,255,.05)';
    }else{
      fields.classList.add('hidden');
      card.style.border='1px solid #d1d5db';
      card.style.background='#f9fafb';
    }
  }
  updateMemberCount();
}
function toggleAllMembers(checked){
  var cbs=document.querySelectorAll('[data-mi]');
  cbs.forEach(function(cb,idx){cb.checked=checked;toggleMemberItem(idx);});
}
function onShopChange(shopId){
  if(modal&&modal.data)modal.data.shop=shopId;
  else if(modal)modal.data={shop:shopId};
  renderModal();
}
function onDishSelect(idx,dish){
  var shopId=document.getElementById('shopSelect');
  if(!shopId)return;
  var shop=shops.find(function(s){return s.id===shopId.value;});
  if(!shop||!shop.items)return;
  var item=shop.items.find(function(i){return i.dish===dish;});
  if(item){
    var priceInput=document.querySelector('[name="price_'+idx+'"]');
    if(priceInput)priceInput.value=item.price;
  }
}
function updateMemberCount(){
  var cnt=document.querySelectorAll('[data-mi]:checked').length;
  var el=document.getElementById('memberCount');
  if(el)el.textContent=cnt+' '+t('people');
}

/* ── REALTIME ── */
db.collection('bills').orderBy('createdAt').onSnapshot(function(snap){bills=snap.docs.map(function(d){var x=d.data();x.id=d.id;return x;});bOk=true;render();});
db.collection('payments').orderBy('createdAt').onSnapshot(function(snap){payments=snap.docs.map(function(d){var x=d.data();x.id=d.id;return x;});pOk=true;render();});
db.collection('members').onSnapshot(function(snap){members=snap.docs.map(function(d){var x=d.data();x.id=d.id;return x;});mOk=true;render();});
db.collection('shops').orderBy('name').onSnapshot(function(snap){shops=snap.docs.map(function(d){var x=d.data();x.id=d.id;return x;});render();});
