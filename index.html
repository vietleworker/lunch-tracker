function t(k){return L[lang][k]||L.en[k]||k}

function toDateInput(ds){
  // Convert "08 May 2026" -> "2026-05-08"
  try{var d=new Date(ds);if(isNaN(d))return '';
  return d.getFullYear()+'-'+(d.getMonth()+1).toString().padStart(2,'0')+'-'+d.getDate().toString().padStart(2,'0');}
  catch(e){return '';}
}
function fromDateInput(ds){
  // Convert "2026-05-08" -> "08 May 2026"
  try{var d=new Date(ds+'T12:00:00');if(isNaN(d))return ds;
  return d.getDate().toString().padStart(2,'0')+' '+d.toLocaleString('en-US',{month:'short'})+' '+d.getFullYear();}
  catch(e){return ds;}
}
function todayInput(){return toDateInput(today());}

function toInputDate(ds){
  // "08 May 2026" -> "2026-05-08"
  try{var d=new Date(ds);if(isNaN(d))return'';
  return d.getFullYear()+'-'+(d.getMonth()+1).toString().padStart(2,'0')+'-'+d.getDate().toString().padStart(2,'0');}
  catch(e){return'';}
}

  catch(e){return v;}
}
function dayOfWeek(ds){try{
  if(!ds)return'';
  // Add T12:00 for ISO dates to avoid timezone issues
  var d=ds.match(/^\d{4}-\d{2}-\d{2}$/)?new Date(ds+'T12:00:00'):new Date(ds);
  if(isNaN(d))return'';
  var days=lang==='vi'?['CN','T2','T3','T4','T5','T6','T7']:['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  return days[d.getDay()];}catch(e){return'';}}
function esc(s){if(!s)return'';var m={'&':'&amp;','<':'&lt;','>':'&gt;'};return String(s).replace(/[&<>]/g,function(c){return m[c]||c})}
function memberByEn(en){for(var i=0;i<members.length;i++)if(members[i].en===en)return members[i];return null}
function initials(en){return(en||'?').slice(0,2).toUpperCase()}
function tsOf(d){return d.createdAt?(d.createdAt.toMillis?d.createdAt.toMillis():new Date(d.createdAt).getTime()):0}

function normDate(ds){
  if(!ds)return'';
  if(/^\d{4}-\d{2}-\d{2}$/.test(ds))return ds;
  try{var d=new Date(ds);if(!isNaN(d))return d.getFullYear()+'-'+(d.getMonth()+1).toString().padStart(2,'0')+'-'+d.getDate().toString().padStart(2,'0');}catch(e){}
  return ds;
}
function displayDate(ds){
  // Show any date as "11 May 2026"
  if(!ds)return'';
  var d=ds.match(/^\d{4}-\d{2}-\d{2}$/)?new Date(ds+'T12:00:00'):new Date(ds);
  if(isNaN(d))return ds;
  return d.getDate().toString().padStart(2,'0')+' '+d.toLocaleString('en-US',{month:'short'})+' '+d.getFullYear();
}

function paymentsForBill(bill){
  var billNorm=normDate(bill.date);
  if(!billNorm)return[];
  var all=payments.filter(function(p){
    if(p.billId)return p.billId===bill.id;
    var covers=p.covers||p.date||'';
    return normDate(covers)===billNorm;
  });
  // If bill has items, only include payments from members in the bill
  var items=bill.items||[];
  if(items.length===0)return all;
  var billMembers={};items.forEach(function(it){if(it.en)billMembers[it.en]=true;});
  return all.filter(function(p){return billMembers[p.en];});
}

function getWeekKey(dateStr){
  try{var d=dateStr&&dateStr.match(/^\d{4}-\d{2}-\d{2}$/)?new Date(dateStr+'T12:00:00'):new Date(dateStr);if(isNaN(d))return'other';
  var now=new Date();var startOfWeek=new Date(now);startOfWeek.setDate(now.getDate()-((now.getDay()+6)%7));startOfWeek.setHours(0,0,0,0);
  var endOfWeek=new Date(startOfWeek);endOfWeek.setDate(startOfWeek.getDate()+7);
  var lastWeekStart=new Date(startOfWeek);lastWeekStart.setDate(startOfWeek.getDate()-7);
  if(d>=startOfWeek&&d<endOfWeek)return'thisWeek';
  if(d>=lastWeekStart&&d<startOfWeek)return'lastWeek';
  return'earlier';}catch(e){return'other';}
}

function compressImage(file,maxW,quality){
  return new Promise(function(resolve,reject){var reader=new FileReader();
    reader.onload=function(e){var img=new Image();img.onload=function(){
      var w=img.width,h=img.height;if(w>maxW){h=Math.round(h*maxW/w);w=maxW;}
      var c=document.createElement('canvas');c.width=w;c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      try{resolve(c.toDataURL('image/jpeg',quality));}catch(err){reject(err);}
    };img.onerror=function(){reject(new Error('fail'));};img.src=e.target.result;};
    reader.onerror=function(){reject(new Error('fail'));};reader.readAsDataURL(file);});
}

function calcMemberBalances(){
  var status={};
  members.forEach(function(m){status[m.en]={unpaidDates:[],paidDates:[],totalPaid:0,totalOwed:0};});
  
  // Only count payments for THIS WEEK's bills
  var thisWeekBills=bills.filter(function(b){return getWeekKey(b.date)==='thisWeek';});
  var thisWeekDates={};
  thisWeekBills.forEach(function(b){thisWeekDates[normDate(b.date)]=true;});
  
  // Only count payments that match this week's bills
  payments.forEach(function(p){
    if(!status[p.en])return;
    var cn=normDate(p.covers||p.date);
    if(thisWeekDates[cn])status[p.en].totalPaid+=(p.amount||0);
  });

  thisWeekBills.forEach(function(bill){
    var billItems=bill.items||[];if(!billItems.length)return;
    var bp=paymentsForBill(bill);
    var paidNames={};bp.forEach(function(p){paidNames[p.en]=true;});
    var numItems=billItems.length;
    var estPerPerson=numItems>0?Math.round((bill.total||0)/numItems):0;
    var shortDate=displayDate(bill.date).replace(' 2026','').replace(' 2025','');
    billItems.forEach(function(item){
      if(!status[item.en])status[item.en]={unpaidDates:[],paidDates:[],totalPaid:0,totalOwed:0};
      var itemAmt=item.price>0?item.price:estPerPerson;
      if(paidNames[item.en]){
        status[item.en].paidDates.push(shortDate);
      }else{
        status[item.en].unpaidDates.push({date:shortDate,amount:itemAmt,billId:bill.id,billNo:bill.billNo||0,billNote:(bill.note||'').replace(/^#\d+\s*/,'').substring(0,30)});
        status[item.en].totalOwed+=itemAmt;
      }
    });
  });
  return status;
}


function calcMemberStats(){
  var stats={};
  var thisWeekBills=bills.filter(function(b){return getWeekKey(b.date)==='thisWeek';});
  var totalBillDays=thisWeekBills.length;
  var balances=calcMemberBalances();
  // startOfWeek scoped here for weekly history calculation
  var _now=new Date();var startOfWeek=new Date(_now);startOfWeek.setDate(_now.getDate()-((_now.getDay()+6)%7));startOfWeek.setHours(0,0,0,0);

  members.forEach(function(m){
    var en=m.en;
    var myPayments=payments.filter(function(p){return p.en===en;});
    var bal=balances[en]||{unpaidDates:[],paidDates:[],totalPaid:0,totalOwed:0};

    var daysEaten=0;
    thisWeekBills.forEach(function(b){
      var items=b.items||[];
      if(items.some(function(it){return it.en===en;}))daysEaten++;
    });

    var prices=[];var dishCount={};
    bills.forEach(function(b){
      (b.items||[]).forEach(function(it){
        if(it.en===en){
          if(it.price>0)prices.push(it.price);
          if(it.dish){var d=it.dish.toLowerCase().trim();if(d)dishCount[d]=(dishCount[d]||0)+1;}
        }
      });
    });
    var avgMeal=prices.length?Math.round(prices.reduce(function(s,p){return s+p;},0)/prices.length):0;

    var favDish='',favCount=0;
    Object.keys(dishCount).forEach(function(d){if(dishCount[d]>favCount){favCount=dishCount[d];favDish=d;}});

    // ââ Speed formula: score = max(0.5, 5 - delayDays)
    //    paid   â delay = payDate - billDate
    //    unpaid â delay = today - billDate (counts up)
    function calcBillScore(b,myPays){
      var billNorm=normDate(b.date);
      var billD=new Date(billNorm+'T12:00:00');
      var pay=myPays.find(function(p){
        if(p.billId)return p.billId===b.id;
        return normDate(p.covers||p.date)===billNorm;
      });
      if(!pay)return null; // unpaid = no score yet
      var refD=pay.createdAt?(pay.createdAt.toDate?pay.createdAt.toDate():new Date(pay.createdAt)):billD;
      var delay=Math.max(0,Math.round((refD-billD)/(1000*60*60*24)));
      return Math.max(0.5,5-delay);
    }

    // This week average — only PAID bills count (unpaid = pending, no score yet)
    var weekScores=[];
    thisWeekBills.forEach(function(b){
      if(!(b.items||[]).some(function(it){return it.en===en;}))return;
      var sc=calcBillScore(b,myPayments);
      if(sc!==null)weekScores.push(sc);
    });
    var avgSpeed=weekScores.length?Math.round(weekScores.reduce(function(s,v){return s+v;},0)/weekScores.length*10)/10:0;

    // 4-week history
    var weekHistory=[];
    for(var wk=0;wk<4;wk++){
      var wStart=new Date(startOfWeek);wStart.setDate(startOfWeek.getDate()-7*wk);
      var wEnd=new Date(wStart);wEnd.setDate(wStart.getDate()+7);
      var wScores=[];
      bills.forEach(function(b){
        if(!(b.items||[]).some(function(it){return it.en===en;}))return;
        var d=new Date(normDate(b.date)+'T12:00:00');
        if(d<wStart||d>=wEnd)return;
        if(wk===0){
          // Current week: skip unpaid (score not locked in yet)
          var sc=calcBillScore(b,myPayments);
          if(sc!==null)wScores.push(sc);
        }else{
          // Past weeks: unpaid bills get max penalty (delay = today - billDate)
          var billNorm2=normDate(b.date);
          var billD2=new Date(billNorm2+'T12:00:00');
          var pay2=myPayments.find(function(p){
            if(p.billId)return p.billId===b.id;
            return normDate(p.covers||p.date)===billNorm2;
          });
          var refD2=pay2?(pay2.createdAt?(pay2.createdAt.toDate?pay2.createdAt.toDate():new Date(pay2.createdAt)):billD2):new Date();
          var delay2=Math.max(0,Math.round((refD2-billD2)/(1000*60*60*24)));
          wScores.push(Math.max(0.5,5-delay2));
        }
      });
      if(!wScores.length)continue;
      var wAvg=Math.round(wScores.reduce(function(s,v){return s+v;},0)/wScores.length*10)/10;
      var d1=wStart.getDate()+'/'+(wStart.getMonth()+1);
      var d2=new Date(wEnd-1).getDate()+'/'+(new Date(wEnd-1).getMonth()+1);
      weekHistory.push({
        label:wk===0?'This week':wk===1?'Last week':wk+' weeks ago',
        range:d1+' - '+d2,avg:wAvg,meals:wScores.length,
        pending:wk===0
      });
    }

    stats[en]={
      en:en,vn:m.vn||'',
      totalPaid:bal.totalPaid,totalOwed:bal.totalOwed,
      unpaidDates:bal.unpaidDates,
      daysEaten:daysEaten,totalBillDays:totalBillDays,
      avgMeal:avgMeal,avgSpeed:avgSpeed,weekHistory:weekHistory,
      favDish:favDish,favCount:favCount,
      payCount:myPayments.length
    };
  });
  return stats;
}

function getUnmatchedPayments(){
  var billIds={};var billDates={};
  bills.forEach(function(b){billIds[b.id]=true;billDates[normDate(b.date)]=true;});
  return payments.filter(function(p){
    if(p.billId)return!billIds[p.billId];
    return!billDates[normDate(p.covers||p.date)];
  });
}

}

function renderBills(){
  if(!bills.length)return'<div class="text-center text-txt3 py-12">'+t('noData')+'</div>';
  // Sort by actual bill date descending (not createdAt)
  var sorted=bills.slice().sort(function(a,b){
    try{return new Date(b.date).getTime()-new Date(a.date).getTime();}catch(e){return 0;}
  });
  var groups={thisWeek:[],lastWeek:[],earlier:[]};
  sorted.forEach(function(b){var wk=getWeekKey(b.date);(groups[wk]||groups.earlier).push(b);});
  // Within each group: sort by day of week, Friday (5) first â Mon (1) last
  var DOW_ORDER={5:0,4:1,3:2,2:3,1:4,6:5,0:6};
  function sortByDow(arr){return arr.sort(function(a,b){
    var da=new Date(a.date),db=new Date(b.date);
    if(isNaN(da)||isNaN(db))return 0;
    var diff=DOW_ORDER[da.getDay()]-DOW_ORDER[db.getDay()];
    return diff!==0?diff:db.getTime()-da.getTime(); // same DOW â newer first
  });}
  Object.keys(groups).forEach(function(k){sortByDow(groups[k]);});

  // Helper: get week date range
  function getWeekRange(key){
    var now=new Date();var s=new Date(now);s.setDate(now.getDate()-now.getDay()+1);s.setHours(0,0,0,0);// Monday
    var e=new Date(s);e.setDate(s.getDate()+4);// Friday
    if(key==='lastWeek'){s.setDate(s.getDate()-7);e.setDate(e.getDate()-7);}
    else if(key==='earlier')return'';
    var fmt2=function(d){return d.getDate()+' '+d.toLocaleString('en-US',{month:'short'});};
    return fmt2(s)+' - '+fmt2(e);
  }

  // Helper: build weekly summary
  function weekSummary(weekBills){
    var totalBill=0,totalRec=0,allItems=[],pplSet={};
    weekBills.forEach(function(b){
      totalBill+=(b.total||0);
      var bp=paymentsForBill(b);totalRec+=bp.reduce(function(s,p){return s+(p.amount||0);},0);
      (b.items||[]).forEach(function(it){
        allItems.push(it);pplSet[it.en]=true;
      });
    });
    var pplCount=Object.keys(pplSet).length;
    // Most expensive / cheapest eater — aggregate per person first
    var pplSpend={};
    allItems.forEach(function(it){
      if(it.price>0&&it.en){
        pplSpend[it.en]=(pplSpend[it.en]||0)+it.price;
      }
    });
    var maxPrice=0,minPrice=Infinity,maxNames=[],minNames=[];
    Object.keys(pplSpend).forEach(function(en){
      var p=pplSpend[en];
      if(p>maxPrice){maxPrice=p;maxNames=[en];}
      else if(p===maxPrice)maxNames.push(en);
      if(p<minPrice){minPrice=p;minNames=[en];}
      else if(p===minPrice)minNames.push(en);
    });
    var maxItem=maxNames.length?{en:maxNames.join(' & '),price:maxPrice}:null;
    var minItem=minNames.length&&minPrice!==maxPrice?{en:minNames.join(' & '),price:minPrice}:null;
    // Most popular dish
    var dishCnt={};allItems.forEach(function(it){if(it.dish){var d=it.dish.trim();if(d)dishCnt[d]=(dishCnt[d]||0)+1;}});
    var topDish='',topDishCnt=0;Object.keys(dishCnt).forEach(function(d){if(dishCnt[d]>topDishCnt){topDishCnt=dishCnt[d];topDish=d;}});

    var h='<div class="bg-surface-white rounded-xl shadow-card border border-outline-v/20 p-4 mb-4">';
    h+='<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;text-align:center">';
    h+='<div><div class="text-[10px] text-txt3 font-bold" style="text-transform:uppercase;letter-spacing:.5px">Total bills</div><div class="text-lg font-bold">'+fmt(totalBill)+'<span class="text-xs text-txt3">&#273;</span></div></div>';
    h+='<div><div class="text-[10px] text-txt3 font-bold" style="text-transform:uppercase;letter-spacing:.5px">Collected</div><div class="text-lg font-bold" style="color:#059669">'+fmt(totalRec)+'<span class="text-xs text-txt3">&#273;</span></div></div>';
    h+='<div><div class="text-[10px] text-txt3 font-bold" style="text-transform:uppercase;letter-spacing:.5px">Outstanding</div><div class="text-lg font-bold" style="color:#dc2626">'+fmt(totalBill-totalRec)+'<span class="text-xs text-txt3">&#273;</span></div></div>';
    h+='<div><div class="text-[10px] text-txt3 font-bold" style="text-transform:uppercase;letter-spacing:.5px">People</div><div class="text-lg font-bold">'+pplCount+'</div></div>';
    h+='</div>';
    // Fun stats row
    var funStats=[];
    if(maxItem)funStats.push('<span class="mi" style="font-size:13px;color:#dc2626">local_fire_department</span> <b>'+esc(maxItem.en)+'</b> ate priciest ('+fmtK(maxItem.price)+')');
    if(minItem&&minItem.en!==( maxItem?maxItem.en:''))funStats.push('<span class="mi" style="font-size:13px;color:#059669">eco</span> <b>'+esc(minItem.en)+'</b> ate cheapest ('+fmtK(minItem.price)+')');
    if(topDish)funStats.push('<span class="mi" style="font-size:13px;color:#d97706">restaurant</span> Popular: <b>'+esc(topDish)+'</b> ('+topDishCnt+'x)');
    if(funStats.length){
      h+='<div style="border-top:1px solid #f0f0f0;margin-top:10px;padding-top:8px;display:flex;flex-wrap:wrap;gap:8px 16px;font-size:11px;color:#737373">';
      funStats.forEach(function(s){h+='<div>'+s+'</div>';});
      h+='</div>';
    }
    h+='</div>';
    return h;
  }

  var html='<div class="space-y-6">';
  [{key:'thisWeek',label:t('thisWeek')},{key:'lastWeek',label:t('lastWeek')},{key:'earlier',label:t('earlier')}].forEach(function(g){
    if(!groups[g.key].length)return;
    var open=weekState[g.key]!==false;
    var range=getWeekRange(g.key);
    html+='<section><button onclick="toggleWeek(\''+g.key+'\')" class="flex items-center gap-2 w-full text-left mb-3 p-2 rounded-lg hover:bg-surface-low transition-colors group"><span class="mi text-txt3 group-hover:text-primary transition-colors">'+(open?'expand_more':'chevron_right')+'</span><h2 class="text-title font-bold uppercase tracking-wide">'+g.label+(range?' <span class="text-body-sm text-txt3 font-normal normal-case">('+range+')</span>':'')+'</h2></button>';
    if(open){
      html+=weekSummary(groups[g.key]);
      html+='<div class="space-y-4">';
      var labelIcons={lunch:'\u2600',dinner:'\u263D',snack:'\u2615',other:'\u2726'};
      groups[g.key].forEach(function(bill){
        var bp=paymentsForBill(bill);var received=bp.reduce(function(s,p){return s+(p.amount||0)},0);
        var total=bill.total||0;var pct=total>0?Math.min(100,Math.round(received/total*100)):0;
        var short_=total-received;var dow=dayOfWeek(bill.date);
        var paidNames={};bp.forEach(function(p){paidNames[p.en]=true;});
        var notPaid=members.filter(function(m){return!paidNames[m.en]}).map(function(m){return m.en});
        var isPaid=pct>=100;var progColor=pct<30?'bg-error':pct<70?'bg-tertiary-c':'bg-secondary';
        html+='<div class="bg-surface-white rounded-xl shadow-card border border-outline-v/20 overflow-hidden">';
        html+='<div class="p-5 border-b border-outline-v/30"><div class="flex justify-between items-start gap-4 cursor-pointer" data-eb="'+bill.id+'"><div><div class="flex items-center gap-2 mb-1"><span class="text-label font-bold text-txt3 bg-surface-low px-2 py-1 rounded uppercase">'+(dow||'')+'</span><span class="text-body-sm text-txt3">'+displayDate(bill.date)+'</span>'+(bill.label&&bill.label!=='lunch'?'<span style="font-size:10px;font-weight:700;padding:1px 7px;border-radius:8px;background:#e0e7ff;color:#3730a3">'+(labelIcons[bill.label]||'')+' '+t("label"+bill.label.charAt(0).toUpperCase()+bill.label.slice(1))+'</span>':'')+(bill.shop?(function(){var bs=shops.find(function(s){return s.id===bill.shop});return bs?'<span style="font-size:10px;font-weight:600;padding:1px 7px;border-radius:8px;background:rgba(0,102,255,.1);color:#0066ff">'+esc(bs.name)+'</span>':'';})():'')+'</div><div class="text-headline text-primary font-semibold">'+esc(bill.note||'--')+'</div></div><div class="text-right"><div class="text-2xl font-bold tabular-nums">'+fmt(total)+'<span class="text-title ml-1">&#273;</span></div>';
        html+='<div class="mt-1"><span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-label '+(isPaid?'bg-secondary-c/20 text-secondary-on':'bg-tertiary-bg text-tertiary')+'""><span class="mi text-[14px]">'+(isPaid?'check_circle':'sync')+'</span>'+(isPaid?t('fullyPaid'):t('collecting'))+'</span></div>';
        html+='</div></div></div>';
        if(bill.photoData)html+='<img src="'+bill.photoData+'" class="w-full max-h-48 object-cover cursor-pointer" onclick="showLightbox(this.src)"/>';
        // Daily mini-summary
        (function(){
          var di=bill.items||[];
          if(!di.length)return;
          var dSpend={};
          di.forEach(function(it){if(it.price>0&&it.en)dSpend[it.en]=(dSpend[it.en]||0)+it.price;});
          var dMax=0,dMin=Infinity,dMaxNames=[],dMinNames=[];

          });
          var dDishCnt={};di.forEach(function(it){if(it.dish){var d=it.dish.trim();if(d)dDishCnt[d]=(dDishCnt[d]||0)+1;}});
          var dTopDish='',dTopCnt=0;Object.keys(dDishCnt).forEach(function(d){if(dDishCnt[d]>dTopCnt){dTopCnt=dDishCnt[d];dTopDish=d;}});
          var stats=[];

          if(dMinNames.length&&dMin!==dMax)stats.push('<span class="mi" style="font-size:12px;color:#059669">eco</span><b>'+esc(dMinNames.join(' & '))+'</b> ('+fmtK(dMin)+')');

        html+='<div class="p-5"><div class="grid grid-cols-1 md:grid-cols-2 gap-6">';
        
        // Left column: Items list or Paid list

function submitQuickPayment(e,en,vn){
  e.preventDefault();var fd=new FormData(e.target);
  var coversDate=fromInputDate(fd.get('covers'));
  var coversNorm=normDate(coversDate);
  var btn=e.target.querySelector('button[type=submit]');if(btn)btn.disabled=true;
  
  // Check for existing payment (prevent duplicate)
  var existing=payments.find(function(p){return p.en===en&&normDate(p.covers||p.date)===coversNorm;});
  if(existing){
    if(!confirm(en+' already paid '+fmt(existing.amount)+'d for '+displayDate(coversDate)+'. Add another payment?')){
      if(btn)btn.disabled=false;return;
    }
  }
  
  var bId=fd.get('billId')||'';
  var payload={en:en,vn:vn,amount:parseInt(fd.get('amount'))||0,covers:coversDate,method:fd.get('method')||'Bank Transfer',date:today(),createdAt:new Date()};if(bId)payload.billId=bId;
  db.collection('payments').add(payload)
    .then(function(){closeQuickPayment();})
    .catch(function(err){alert(err.message);if(btn)btn.disabled=false;});
}

/* ââ Shop Modal ââ */
var shopModal=null;
function openShopModal(id){
  if(!isAdmin){openLoginModal();return;}
  if(id){
    var s=shops.find(function(x){return x.id===id;});
    var copyItems=(s.items||[]).map(function(i){return {dish:i.dish,price:i.price};});
    shopModal={mode:'edit',data:{id:s.id,name:s.name,items:copyItems}};
  }else{
    shopModal={mode:'add',data:{name:'',items:[{dish:'',price:0}]}};
  }
  renderShopModal();
}
function closeShopModal(){shopModal=null;document.getElementById('modal-host').innerHTML='';renderAll();}
function syncShopForm(){
  if(!shopModal)return;
  var form=document.getElementById('shopForm');
  if(!form)return;
  var fd=new FormData(form);
  shopModal.data.name=fd.get('shopname')||'';
  var items=[];
  for(var i=0;i<100;i++){
    var dish=fd.get('sdish_'+i);if(dish===null)break;
    var price=parseInt(fd.get('sprice_'+i))||0;
    items.push({dish:dish,price:price});
  }
  shopModal.data.items=items;
}
function addShopItem(){syncShopForm();shopModal.data.items.push({dish:'',price:0});renderShopModal();}
function removeShopItem(idx){syncShopForm();shopModal.data.items.splice(idx,1);renderShopModal();}

function renderShopModal(){
  if(!shopModal)return;
  var d=shopModal.data;var isEdit=shopModal.mode==='edit';
  var itemsHtml='';
  (d.items||[]).forEach(function(it,i){
    itemsHtml+='<div class="flex gap-2 items-center mb-2"><input name="sdish_'+i+'" value="'+esc(it.dish)+'" placeholder="Dish name" class="flex-1 bg-surface-low border border-outline-v/50 rounded-lg py-1.5 px-2 text-sm"/><div class="relative w-28"><input name="sprice_'+i+'" type="number" value="'+(it.price||'')+'" placeholder="0" class="w-full bg-surface-low border border-outline-v/50 rounded-lg py-1.5 px-2 text-sm text-right"/><span class="absolute right-2 top-1/2 -translate-y-1/2 text-[10px] text-txt3">\u0111</span></div><button type="button" onclick="removeShopItem('+i+')" class="text-error text-lg font-bold w-6 h-6 flex items-center justify-center">&times;</button></div>';
  });
  var html='<div class="fixed inset-0 bg-black/40 backdrop-blur-sm z-[100] flex items-center justify-center p-4" onclick="if(event.target===this)closeShopModal()"><div class="bg-surface-white w-full max-w-[420px] rounded-[20px] shadow-modal flex flex-col overflow-hidden max-h-[90vh]" onclick="event.stopPropagation()"><div class="flex items-center justify-between px-6 py-4 border-b border-outline-v/30"><h2 class="text-title font-bold">'+(isEdit?t('editShop'):t('addShop'))+'</h2><button onclick="closeShopModal()" class="w-8 h-8 rounded-full hover:bg-surface-low flex items-center justify-center text-txt3"><span class="mi text-[20px]">close</span></button></div><form id="shopForm" class="px-6 py-4 overflow-y-auto flex-1"><div class="mb-4"><label class="text-label font-bold text-txt3 uppercase tracking-wider block mb-1">'+t('shopName')+'</label><input name="shopname" value="'+esc(d.name)+'" required class="w-full bg-surface-low border border-outline-v/50 rounded-xl px-4 py-2 text-sm"/></div><div><label class="text-label font-bold text-txt3 uppercase tracking-wider block mb-2">'+t('menuItems')+'</label>'+itemsHtml+'<button type="button" onclick="addShopItem()" class="text-xs text-primary font-bold flex items-center gap-1 mt-1"><span class="mi text-[14px]">add</span>'+t('addDish')+'</button></div></form><div class="px-6 py-4 border-t border-outline-v/30 flex justify-end gap-3"><button type="button" onclick="closeShopModal()" class="px-4 py-2 rounded-lg text-primary border border-outline-v/30 text-sm font-semibold">'+t('cancel')+'</button>'+(isEdit?'<button type="button" onclick="deleteShop()" class="px-4 py-2 rounded-lg text-error border border-error-c text-sm font-semibold">'+t('delete')+'</button>':'')+'<button type="submit" form="shopForm" class="px-4 py-2 rounded-lg bg-primary-c text-white text-sm font-semibold">'+t('saveShop')+'</button></div></div></div>';
  document.getElementById('modal-host').innerHTML=html;
  document.getElementById('shopForm').onsubmit=function(e){
    e.preventDefault();
    var fd=new FormData(e.target);
    var name=fd.get('shopname')||'';
    var items=[];
    for(var i=0;i<100;i++){
      var dish=fd.get('sdish_'+i);if(dish===null)break;
      var price=parseInt(fd.get('sprice_'+i))||0;
      if(dish.trim())items.push({dish:dish.trim(),price:price});
    }
    var payload={name:name,items:items};
    var op;
    if(isEdit)op=db.collection('shops').doc(shopModal.data.id).update(payload);
    else{payload.createdAt=new Date();op=db.collection('shops').add(payload);}
    op.then(closeShopModal).catch(function(err){alert(err.message);});
  };
}
function deleteShop(){
  if(!shopModal||!shopModal.data.id)return;
  if(!confirm(t('delete')+'?'))return;
  db.collection('shops').doc(shopModal.data.id).delete().then(closeShopModal).catch(function(err){alert(err.message);});
}

function handleSubmit(e){
  e.preventDefault();if(saving||compressing)return;saving=true;
  var fd=new FormData(e.target);var payload,coll;
  if(modal.type==='bill'){
    coll='bills';payload={date:fd.get('date'),total:parseInt(fd.get('total'))||0,note:fd.get('note')||'',shop:fd.get('shop')||'',label:fd.get('label')||'lunch'};
    // Collect member items
    var items=[];var sortedM=members.slice().sort(function(a,b){return(a.order||99)-(b.order||99)});
    sortedM.forEach(function(m,idx){
      var cb=document.querySelector('[data-mi="'+idx+'"]');
      if(cb&&cb.checked){
        // Collect multi-checkbox dishes via DOM (FormData skips unchecked)
      var selDishes=[];
      document.querySelectorAll('[name^="dish_'+idx+'_"]').forEach(function(cb){
        if(cb.checked)selDishes.push(cb.value);
      });
      // Fallback: single dish text input (manual mode / no shop)
      var singleDish=fd.get('dish_'+idx)||'';
      var dish=selDishes.length>0?selDishes.join(', '):singleDish;
      var price=parseInt(fd.get('price_'+idx))||0;
        items.push({en:m.en,dish:dish,price:price});
      }
    });
    payload.items=items; // always save, empty array = no items
  }else{
    coll='payments';var parts=(fd.get('member')||'|').split('|');
    payload={en:parts[0],vn:parts[1]||'',amount:parseInt(fd.get('amount'))||0,covers:fromDateInput(fd.get('covers')),method:fd.get('method')||'Bank Transfer',date:fromDateInput(fd.get('date'))};
    var billIdSel=document.getElementById('billIdSelect');if(billIdSel&&billIdSel.value)payload.billId=billIdSel.value;
  }
  if(pendingPhoto)payload.photoData=pendingPhoto;
  else if(modal.mode==='edit'&&modal.data.photoData&&!pendingPhoto)payload.photoData=firebase.firestore.FieldValue.delete();
  renderModal();var op;
  if(modal.mode==='edit')op=db.collection(coll).doc(modal.data.id).update(payload);
  else{payload.createdAt=new Date();op=db.collection(coll).add(payload);}
  op.then(function(){saving=false;closeModal();}).catch(function(err){alert(err.message);saving=false;renderModal();});
}

function copyTemplate(text){

    var t=document.createElement('div');
    t.textContent='Copied!';
    t.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1a2e;color:#fff;padding:8px 20px;border-radius:20px;font-size:13px;font-weight:700;z-index:9999';

function updatePriceSummary(){
  var bar=document.getElementById('priceSummaryBar');
  var rowsEl=document.getElementById('priceSummaryRows');
  var sumEl=document.getElementById('priceSumTotal');
  var badge=document.getElementById('priceMatchBadge');
  if(!bar||!rowsEl||!sumEl)return;
  var totalInput=document.querySelector('[name="total"]');
  var billTotal=totalInput?parseInt(totalInput.value)||0:0;
  var cbs=document.querySelectorAll('[data-mi]');
  var rows=[],sum=0;
  cbs.forEach(function(cb,idx){
    if(!cb.checked)return;
    var card=document.getElementById('mi-'+idx);
    if(!card)return;
    var nameEl=card.querySelector('p.text-sm');
    var priceInput=card.querySelector('[name^="price_"]');
    var price=priceInput?parseInt(priceInput.value)||0:0;
    var name=nameEl?nameEl.textContent:'?';
    sum+=price;
    rows.push({name:name,price:price});
  });
  if(rows.length===0){bar.style.display='none';return;}
  bar.style.display='block';
  var html='';
  rows.forEach(function(r){
    html+='<div style="display:flex;justify-content:space-between;padding:1px 0;color:#525252">'+
    '<span>'+esc(r.name)+'</span>'+
    '<span style="font-weight:600">'+Math.round(r.price/1000)+'k</span></div>';
  });
  rowsEl.innerHTML=html;
  sumEl.textContent=Math.round(sum/1000)+'k';
  if(billTotal>0){
    var diff=sum-billTotal;
    if(diff===0){
      sumEl.style.color='#059669';
      badge.textContent='â Matches bill total';badge.style.background='#ecfdf5';badge.style.color='#065f46';
    }else{
      sumEl.style.color='#dc2626';
      var sign=diff>0?'+':'';
      badge.textContent=sign+Math.round(diff/1000)+'k vs bill';badge.style.background='#fef2f2';badge.style.color='#dc2626';
    }
  }else{
    sumEl.style.color='#0066ff';badge.textContent='';
  }
}

<script>
function showQR(btn){
  var card=btn.closest("[data-owes]")||btn.parentElement.parentElement.parentElement;
  var amt=0,content="",name="";
  // Try to get data from the card
  var owesEl=card.querySelector("[data-owes-amount]");
  if(owesEl){amt=parseInt(owesEl.getAttribute("data-owes-amount"))||0;content=owesEl.getAttribute("data-transfer-content")||"";}
  // Fallback: parse from visible text
  if(!amt){
    var texts=card.innerText;
    var m=texts.match(/Owes\s+([\d,]+)/i);
    if(m)amt=parseInt(m[1].replace(/,/g,""))*1000;
    var m2=texts.match(/([A-Za-z]+)\s+(\d+)\s+(\d+)\s*$/m);
    if(m2)content=m2[1]+" "+m2[2]+" "+m2[3];
  }
  // Get name
  var nameEl=card.querySelector("h3,h4,[class*=name],.font-semibold");
  if(nameEl)name=nameEl.textContent.trim();
  if(!name){var m3=card.innerText.match(/^[A-Za-z]+\s+[A-Za-z]+/);if(m3)name=m3[0];}
  // Build VietQR URL
  var url="https://img.vietqr.io/image/970423-01448819001-compact2.png?amount="+amt+"&addInfo="+encodeURIComponent(content)+"&accountName=LE%20HOANG%20VIET";
  document.getElementById("qrImg").src=url;
  document.getElementById("qrName").textContent=name||"Payment";
  document.getElementById("qrAmount").textContent=new Intl.NumberFormat("vi-VN").format(amt)+"đ";
  document.getElementById("qrContent").textContent=content||"-";
  document.getElementById("qrModal").style.display="flex";
}
function closeQR(){document.getElementById("qrModal").style.display="none";document.getElementById("qrImg").src="";}
</script>

<script id="patch-v2">
(function(){
var FS="https://firestore.googleapis.com/v1/projects/lunche-81567/databases/(default)/documents";
var _meta={},_byDay={},_ok=false;
var _curBillNo=0,_curBillId="";

function pDay(s){if(!s)return 0;var m;
  if((m=s.match(/^(\d{1,2})\s+\w+\s+\d{4}/)))return+m[1];
  if((m=s.match(/^\w+\s+(\d{1,2})/)))return+m[1];
  if((m=s.match(/^\d{4}-\d{2}-(\d{2})/)))return+m[1];
  return 0;}
function sName(n){if(!n)return"?";var l=n.toLowerCase().replace(/\+/g," ");
  if(/my\s*(quang|ga|bo|ca|thit)/i.test(l))return"My Quang";
  if(/com\s*(ga|chien|trung)/i.test(l))return"Com Ga";
  if(/ra\s*cafe|nuoc ep|tra xoai|bac xiu|cafe sua/i.test(l))return"Ra Cafe";
  if(/bun\s*(hue|bo)|tai nam|cha\s*(cua|ca)/i.test(l))return"Bun Hue";
  return n.substring(0,15);}

// Load bills
fetch(FS+"/bills?pageSize=100").then(function(r){return r.json()}).then(function(d){
  var bd={};
  (d.documents||[]).forEach(function(doc){
    var f=doc.fields||{};
    var ds=(f.date&&f.date.stringValue)||"";
    var nt=(f.note&&f.note.stringValue)||"";
    var bn=parseInt((f.billNo&&f.billNo.integerValue)||0);
    var tt=parseInt((f.total&&(f.total.integerValue||f.total.doubleValue))||0);
    var dy=pDay(ds);
    if(!bn)return;
    _meta[bn]={date:ds,note:nt,shop:sName(nt),total:tt,day:dy,id:doc.name.split("/").pop()};
    if(dy&&dy<=31){if(!bd[dy])bd[dy]=[];bd[dy].push({no:bn,nm:doc.name})}
  });
  Object.keys(bd).forEach(function(k){
    bd[k].sort(function(a,b){return a.nm<b.nm?-1:1});
    _byDay[k]=bd[k].map(function(x){return x.no});
  });
  _ok=true;
  console.log("[v4] loaded",Object.keys(_meta).length,"bills");
  updatePink();
});

// ── Track which bill user is viewing ─────────────────────────────
function detectBillContext(){
  // Look for #N in visible bill note text
  var found=0,foundId="";
  document.querySelectorAll("a,h2,h3,h4,div,p,span").forEach(function(el){
    if(found)return;
    var t=(el.textContent||"").trim();
    // Match "#12 Com Ga:..." pattern in bill detail view
    var m=t.match(/^#(\d+)\s+/);
    if(m&&el.offsetHeight>0){
      var no=parseInt(m[1]);
      if(_meta[no]){found=no;foundId=_meta[no].id;}
    }
  });
  if(found&&found!==_curBillNo){
    _curBillNo=found;
    _curBillId=foundId;
    console.log("[v4] Bill context: #"+_curBillNo+" ("+(_meta[found]||{}).shop+")");
    showCtx();
  }
}

// Small indicator showing current bill context
var _ctxEl;
function showCtx(){
  if(!_ctxEl){
    _ctxEl=document.createElement("div");
    _ctxEl.className="_bill-ctx";
    document.body.appendChild(_ctxEl);
  }
  _ctxEl.textContent="Bill #"+_curBillNo+" ("+(_meta[_curBillNo]||{}).shop+")";
  _ctxEl.style.opacity="0.8";
  setTimeout(function(){if(_ctxEl)_ctxEl.style.opacity="0.3"},3000);
}

// Run context detection on scroll/click/mutation
var _detectTimer;
function scheduleDetect(){clearTimeout(_detectTimer);_detectTimer=setTimeout(detectBillContext,200);}
document.addEventListener("scroll",scheduleDetect,true);
document.addEventListener("click",function(){scheduleDetect()},true);
new MutationObserver(scheduleDetect).observe(document.body,{childList:true,subtree:true});

// ── Intercept payment confirmation ───────────────────────────────
// After "Confirm payment" is clicked, watch for new payment docs
// and tag them with billNo + billId
var _lastPaymentCheck=Date.now();

document.addEventListener("click",function(e){
  var btn=e.target.closest?e.target.closest("button"):null;
  if(!btn)return;
  var t=(btn.textContent||"").trim().toLowerCase();
  
  if(t.includes("confirm payment")||t.includes("confirm")){
    if(!_curBillNo){
      console.log("[v4] No bill context for payment");
      return; // Let original handler proceed without tagging
    }
    var tagBillNo=_curBillNo;
    var tagBillId=_curBillId;
    console.log("[v4] Payment confirmed for bill #"+tagBillNo);
    _lastPaymentCheck=Date.now();
    
    // Wait for payment to be created, then tag it
    setTimeout(function(){tagLatestPayment(tagBillNo,tagBillId)},2000);
    setTimeout(function(){tagLatestPayment(tagBillNo,tagBillId)},4000);
  }
},false); // Use bubbling, don't block original handler

function tagLatestPayment(billNo,billId){
  fetch(FS+"/payments?pageSize=5&orderBy=__name__&direction=DESCENDING")
    .then(function(r){return r.json()})
    .then(function(d){
      var docs=d.documents||[];
      docs.forEach(function(doc){
        var f=doc.fields||{};
        var existing=f.billNo&&f.billNo.integerValue;
        if(existing)return; // Already tagged
        
        var created=doc.createTime||"";
        var createMs=new Date(created).getTime();
        // Only tag payments created after our click (within last 10 seconds)
        if(createMs>_lastPaymentCheck-1000){
          var payId=doc.name.split("/").pop();
          var url=FS+"/payments/"+payId+"?updateMask.fieldPaths=billNo&updateMask.fieldPaths=billId";
          fetch(url,{
            method:"PATCH",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({fields:{
              billNo:{integerValue:""+billNo},
              billId:{stringValue:billId}
            }})
          }).then(function(){
            console.log("[v4] Tagged payment "+payId+" → bill #"+billNo);
          });
        }
      });
    });
}

// ── Pink box tokens (same as before) ─────────────────────────────
function buildTokens(raw){
  if(!_ok)return null;
  var p=raw.trim().split(/\s+/);
  if(p.length<2)return null;
  var nm=p[0],dc={},tk=[];
  for(var i=1;i<p.length;i++){
    var mx=p[i].match(/^(\d+)n(\d+)$/);
    if(!mx)continue;
    var dy=parseInt(mx[1]),a=parseInt(mx[2]);
    if(!dy||!a)continue;
    dc[dy]=(dc[dy]||0);var nos=_byDay[dy]||[];var no=nos[dc[dy]]||0;dc[dy]++;
    var m=_meta[no]||{};
    tk.push({txt:no?no+"n"+a:dy+"n"+a,no:no,amt:a,shop:m.shop||"?",date:m.date||""});
  }
  return{name:nm,tokens:tk};
}
function toPlain(raw){var r=buildTokens(raw);if(!r)return raw;return r.name+" "+r.tokens.map(function(t){return t.txt}).join(" ")}
function toRich(raw){
  var r=buildTokens(raw);if(!r)return null;
  return r.name+" "+r.tokens.map(function(t){
    return'<span class="_tip-wrap"><span class="_tip-token" tabindex="0">'+t.txt
      +'<span class="_tip-box"><span class="_tip-amt">'+t.amt+'k</span>'
      +' bill <span class="_tip-bill">#'+t.no+'</span><br>'
      +'<span class="_tip-shop">'+t.shop+'</span> '+t.date+'</span></span></span>';
  }).join(" ");
}
function updatePink(){
  document.querySelectorAll("div").forEach(function(el){
    if(el.querySelector&&el.querySelector("._tip-token"))return;
    if(el.childElementCount>0)return;
    var t=(el.textContent||"").trim();
    if(!/^[A-Z][a-z]+ \d+n\d+/.test(t))return;
    var h=toRich(t);
    if(h){el.innerHTML=h;el.setAttribute("data-plain",toPlain(t))}
  });
}

function getTotal(c){var m=(c.innerText||"").match(/Owes\s+(\d+)k/i);return m?+m[1]*1000:0}

// ── Copy + Scan ──────────────────────────────────────────────────
document.addEventListener("click",function(e){
  var btn=e.target.closest?e.target.closest("button"):null;
  if(!btn)return;var t=(btn.textContent||"").trim();

      btn.textContent="\u2713";btn.style.background="#16a34a";btn.style.color="#fff";
      setTimeout(function(){btn.textContent="Copy";btn.style.background="";btn.style.color="";},2000);
    });
  }
  if(t==="Scan"){
    e.preventDefault();e.stopPropagation();
    var card=btn.closest("[data-member]")||btn.parentElement.parentElement.parentElement;
    var name="",els=card.querySelectorAll("*");
    for(var i=0;i<els.length;i++){var x=(els[i].textContent||"").trim();if(/^[A-Z][a-z]{2,13}$/.test(x)&&els[i].childElementCount===0){name=x;break;}}
    var total=getTotal(card);
    var divs=card.querySelectorAll("div");var last=divs[divs.length-1];
    var content=last.getAttribute("data-plain")||(last.textContent||"").trim();
    var fmt=new Intl.NumberFormat("vi-VN");
    document.getElementById("_qrTitle").textContent=name+" \u2014 "+fmt.format(total)+"\u0111";
    document.getElementById("_qrAmt").textContent=fmt.format(total)+"\u0111";
    document.getElementById("_qrContent").textContent=content;
    document.getElementById("_qrImg").src="https://img.vietqr.io/image/970423-01448819001-compact2.png?amount="+total+"&addInfo="+encodeURIComponent(content)+"&accountName=LE%20HOANG%20VIET";
    document.getElementById("_qrModal").style.display="flex";
  }
},{capture:true});

if(!document.getElementById("_qrModal")){
  var _m=document.createElement("div");_m.id="_qrModal";
  _m.style.cssText="display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:9999;align-items:center;justify-content:center";
  _m.innerHTML='<div style="background:#fff;border-radius:18px;padding:24px 20px;max-width:320px;width:92%;text-align:center;box-shadow:0 24px 64px rgba(0,0,0,.3)"><div id="_qrTitle" style="font-size:17px;font-weight:700;margin-bottom:2px"><\/div><div style="font-size:12px;color:#888;margin-bottom:12px">TPBank \xb7 0144 8819 001 \xb7 LE HOANG VIET<\/div><img id="_qrImg" style="width:260px;height:260px;border-radius:10px;border:1px solid #e5e7eb"\/><div style="margin-top:10px;background:#f0fdf4;border-radius:10px;padding:10px"><div id="_qrAmt" style="font-size:24px;font-weight:700;color:#16a34a"><\/div><div style="font-size:12px;color:#666;margin-top:2px">Noi dung: <b id="_qrContent" style="word-break:break-all"><\/b><\/div><\/div><button id="_qrClose" style="margin-top:12px;width:100%;padding:11px;border:none;border-radius:9px;background:#f3f4f6;font-size:14px;font-weight:600;cursor:pointer">Dong<\/button><\/div>';
  _m.addEventListener("click",function(e){if(e.target===_m){_m.style.display="none";document.getElementById("_qrImg").src="";}});
  document.body.appendChild(_m);
  document.getElementById("_qrClose").addEventListener("click",function(){_m.style.display="none";document.getElementById("_qrImg").src="";});
}

console.log("[v4] payment tagging + tooltips loaded");
})();
