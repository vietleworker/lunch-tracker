function toDateInput(ds){

  try{var d=new Date(ds);if(isNaN(d))return '';
  return d.getFullYear()+'-'+(d.getMonth()+1).toString().padStart(2,'0')+'-'+d.getDate().toString().padStart(2,'0');}
  catch(e){return '';}
}
function fromDateInput(ds){
  // Convert "2026-05-08" -> "08 May 2026"
  try{var d=new Date(ds+'T12:00:00');if(isNaN(d))return ds;
  return d.getDate().toString().padStart(2,'0')+' '+d.toLocaleString('en-US',{month:'short'})+' '+d.getFullYear();}

}

  catch(e){return v;}
}
function dayOfWeek(ds){try{
  if(!ds)return'';
  // Add T12:00 for ISO dates to avoid timezone issues
  var d=ds.match(/^\d{4}-\d{2}-\d{2}$/)?new Date(ds+'T12:00:00'):new Date(ds);
  if(isNaN(d))return'';
  var days=lang==='vi'?['CN','T2','T3','T4','T5','T6','T7']:['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  return days[d.getDay()];}catch(e){return'';}}
function esc(s){if(!s)return'';var m={'&':'&amp;','<':'&lt;','>':'&gt;'};return String(s).replace(/[&<>]/g,function(c){return m[c]||c})}
function memberByEn(en){for(var i=0;i<members.length;i++)if(members[i].en===en)return members[i];return null}
function initials(en){return(en||'?').slice(0,2).toUpperCase()}
function tsOf(d){return d.createdAt?(d.createdAt.toMillis?d.createdAt.toMillis():new Date(d.createdAt).getTime()):0}

function normDate(ds){
  if(!ds)return'';
  if(/^\d{4}-\d{2}-\d{2}$/.test(ds))return ds;
  try{var d=new Date(ds);if(!isNaN(d))return d.getFullYear()+'-'+(d.getMonth()+1).toString().padStart(2,'0')+'-'+d.getDate().toString().padStart(2,'0');}catch(e){}
  return ds;
}
function displayDate(ds){
  // Show any date as "11 May 2026"
  if(!ds)return'';
  var d=ds.match(/^\d{4}-\d{2}-\d{2}$/)?new Date(ds+'T12:00:00'):new Date(ds);
  if(isNaN(d))return ds;
  return d.getDate().toString().padStart(2,'0')+' '+d.toLocaleString('en-US',{month:'short'})+' '+d.getFullYear();
}

function paymentsForBill(bill){
  var billNorm=normDate(bill.date);
  if(!billNorm)return[];
  return payments.filter(function(p){
    var covers=p.covers||p.date||'';
    return normDate(covers)===billNorm;
  });
}

function getWeekKey(dateStr){
  try{var d=dateStr&&dateStr.match(/^\d{4}-\d{2}-\d{2}$/)?new Date(dateStr+'T12:00:00'):new Date(dateStr);if(isNaN(d))return'other';
  var now=new Date();var startOfWeek=new Date(now);startOfWeek.setDate(now.getDate()-now.getDay());startOfWeek.setHours(0,0,0,0);
  var endOfWeek=new Date(startOfWeek);endOfWeek.setDate(startOfWeek.getDate()+7);
  var lastWeekStart=new Date(startOfWeek);lastWeekStart.setDate(startOfWeek.getDate()-7);
  if(d>=startOfWeek&&d<endOfWeek)return'thisWeek';
  if(d>=lastWeekStart&&d<startOfWeek)return'lastWeek';
  return'earlier';}catch(e){return'other';}
}

function compressImage(file,maxW,quality){
  return new Promise(function(resolve,reject){var reader=new FileReader();
    reader.onload=function(e){var img=new Image();img.onload=function(){
      var w=img.width,h=img.height;if(w>maxW){h=Math.round(h*maxW/w);w=maxW;}
      var c=document.createElement('canvas');c.width=w;c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      try{resolve(c.toDataURL('image/jpeg',quality));}catch(err){reject(err);}
    };img.onerror=function(){reject(new Error('fail'));};img.src=e.target.result;};
    reader.onerror=function(){reject(new Error('fail'));};reader.readAsDataURL(file);});
}

function calcMemberBalances(){
  var status={};
  members.forEach(function(m){status[m.en]={unpaidDates:[],paidDates:[],totalPaid:0,totalOwed:0};});
  
  // Only count payments for THIS WEEK's bills
  var thisWeekBills=bills.filter(function(b){return getWeekKey(b.date)==='thisWeek';});
  var thisWeekDates={};
  thisWeekBills.forEach(function(b){thisWeekDates[normDate(b.date)]=true;});
  
  // Only count payments that match this week's bills
  payments.forEach(function(p){
    if(!status[p.en])return;
    var cn=normDate(p.covers||p.date);
    if(thisWeekDates[cn])status[p.en].totalPaid+=(p.amount||0);
  });

  thisWeekBills.forEach(function(bill){
    var billItems=bill.items||[];if(!billItems.length)return;
    var bp=paymentsForBill(bill);
    var paidNames={};bp.forEach(function(p){paidNames[p.en]=true;});
    var numItems=billItems.length;
    var estPerPerson=numItems>0?Math.round((bill.total||0)/numItems):0;
    var shortDate=displayDate(bill.date).replace(' 2026','').replace(' 2025','');
    billItems.forEach(function(item){
      if(!status[item.en])status[item.en]={unpaidDates:[],paidDates:[],totalPaid:0,totalOwed:0};
      var itemAmt=item.price>0?item.price:estPerPerson;
      if(paidNames[item.en]){
        status[item.en].paidDates.push(shortDate);
      }else{
        status[item.en].unpaidDates.push(shortDate);
        status[item.en].totalOwed+=itemAmt;
      }
    });
  });
  return status;
}


function calcMemberStats(){
  var stats={};
  var thisWeekBills=bills.filter(function(b){return getWeekKey(b.date)==='thisWeek';});
  var totalBillDays=thisWeekBills.length;
  var balances=calcMemberBalances();

  members.forEach(function(m){
    var en=m.en;
    var myPayments=payments.filter(function(p){return p.en===en;});
    var bal=balances[en]||{unpaidDates:[],paidDates:[],totalPaid:0,totalOwed:0};

    var daysEaten=0;
    thisWeekBills.forEach(function(b){
      var items=b.items||[];
      if(items.some(function(it){return it.en===en;}))daysEaten++;
    });

    var prices=[];var dishCount={};
    bills.forEach(function(b){
      (b.items||[]).forEach(function(it){
        if(it.en===en){
          if(it.price>0)prices.push(it.price);
          if(it.dish){var d=it.dish.toLowerCase().trim();if(d)dishCount[d]=(dishCount[d]||0)+1;}
        }
      });
    });
    var avgMeal=prices.length?Math.round(prices.reduce(function(s,p){return s+p;},0)/prices.length):0;

    var favDish='',favCount=0;
    Object.keys(dishCount).forEach(function(d){if(dishCount[d]>favCount){favCount=dishCount[d];favDish=d;}});

    var speedScores=[];
    thisWeekBills.forEach(function(b){
      var items=b.items||[];
      if(!items.some(function(it){return it.en===en;}))return;
      var billNorm=normDate(b.date);
      var matchPay=myPayments.find(function(p){return normDate(p.covers||p.date)===billNorm;});
      if(matchPay){
        var billD=new Date(billNorm+'T12:00:00');
        var payD=matchPay.createdAt?(matchPay.createdAt.toDate?matchPay.createdAt.toDate():new Date(matchPay.createdAt)):billD;
        var diffDays=Math.max(0,Math.round((payD-billD)/(1000*60*60*24)));
        if(diffDays<=0)speedScores.push(5);
        else if(diffDays<=1)speedScores.push(4);
        else if(diffDays<=2)speedScores.push(3);
        else if(diffDays<=3)speedScores.push(2);
        else speedScores.push(1);
      }
    });
    var avgSpeed=speedScores.length?Math.round(speedScores.reduce(function(s,v){return s+v;},0)/speedScores.length):0;

    stats[en]={
      totalPaid:bal.totalPaid,totalOwed:bal.totalOwed,
      unpaidDates:bal.unpaidDates,
      daysEaten:daysEaten,totalBillDays:totalBillDays,
      avgMeal:avgMeal,avgSpeed:avgSpeed,
      favDish:favDish,favCount:favCount,
      payCount:myPayments.length
    };
  });
  return stats;
}

function renderBills(){
  if(!bills.length)return'<div class="text-center text-txt3 py-12">'+t('noData')+'</div>';
  // Sort by actual bill date descending (not createdAt)
  var sorted=bills.slice().sort(function(a,b){
    try{return new Date(b.date).getTime()-new Date(a.date).getTime();}catch(e){return 0;}
  });
  var groups={thisWeek:[],lastWeek:[],earlier:[]};
  sorted.forEach(function(b){var wk=getWeekKey(b.date);(groups[wk]||groups.earlier).push(b);});
  // Within each group: sort by day of week, Friday (5) first → Mon (1) last
  var DOW_ORDER={5:0,4:1,3:2,2:3,1:4,6:5,0:6};
  function sortByDow(arr){return arr.sort(function(a,b){
    var da=new Date(a.date),db=new Date(b.date);
    if(isNaN(da)||isNaN(db))return 0;
    var diff=DOW_ORDER[da.getDay()]-DOW_ORDER[db.getDay()];
    return diff!==0?diff:db.getTime()-da.getTime(); // same DOW → newer first
  });}
  Object.keys(groups).forEach(function(k){sortByDow(groups[k]);});

  // Helper: get week date range
  function getWeekRange(key){
    var now=new Date();var s=new Date(now);s.setDate(now.getDate()-now.getDay()+1);s.setHours(0,0,0,0);// Monday
    var e=new Date(s);e.setDate(s.getDate()+4);// Friday
    if(key==='lastWeek'){s.setDate(s.getDate()-7);e.setDate(e.getDate()-7);}
    else if(key==='earlier')return'';
    var fmt2=function(d){return d.getDate()+' '+d.toLocaleString('en-US',{month:'short'});};
    return fmt2(s)+' - '+fmt2(e);
  }

      var bp=paymentsForBill(b);totalRec+=bp.reduce(function(s,p){return s+(p.amount||0);},0);
      (b.items||[]).forEach(function(it){

      });
    });

    });

    var dishCnt={};allItems.forEach(function(it){if(it.dish){var d=it.dish.trim();if(d)dishCnt[d]=(dishCnt[d]||0)+1;}});
    var topDish='',topDishCnt=0;Object.keys(dishCnt).forEach(function(d){if(dishCnt[d]>topDishCnt){topDishCnt=dishCnt[d];topDish=d;}});

            html+='<div><span class="font-medium">'+esc(item.en)+'</span>';

            html+='</div></div>';

            if(!hasPaid)html+='<span class="text-[10px] font-bold text-error bg-error-c/30 px-1.5 py-0.5 rounded">'+t('unpaid')+'</span>';
            html+='<span class="mi text-[16px] '+(hasPaid?'text-secondary':'text-error')+'">'+(hasPaid?'check_circle':'add_circle')+'</span>';
            html+='</div></div>';
          });
          html+='</div></div>';
        }else if(bp.length){
          // Fallback: show payments
          html+='<div><h3 class="text-sm font-semibold text-secondary mb-2 flex items-center gap-1"><span class="mi text-[16px]">payments</span>'+t('paid')+' ('+bp.length+')</h3><div class="space-y-1">';

          html+='</div></div>';
        }

        html+='<div class="bg-surface-low p-4 rounded-xl"><div class="flex justify-between mb-1 text-sm"><span class="text-txt3">'+t('billTotal')+'</span><span class="font-bold">'+fmt(total)+'&#273;</span></div><div class="flex justify-between mb-1 text-sm"><span class="text-secondary">'+t('received')+'</span><span class="font-bold text-secondary">'+fmt(received)+'&#273;</span></div>';
        if(short_>0)html+='<div class="flex justify-between mb-1 text-sm border-t border-outline-v/30 pt-1 mt-1"><span class="text-error font-semibold">'+t('balance')+'</span><span class="font-bold text-error">'+fmt(-short_)+'&#273;</span></div>';
        html+='<div class="prog mt-2"><div class="prog-bar '+progColor+'" style="width:'+pct+'%"></div></div></div></div>';
        // Not yet paid - use items if available, else fallback to all members
        var unpaidList;
        if(billItems.length){unpaidList=billItems.filter(function(it){return!paidNames[it.en]}).map(function(it){return it.en});}
        else{unpaidList=notPaid;}
        if(unpaidList.length)html+='<div class="px-5 py-3 bg-error-c/20 border-t border-error-c/30 text-sm text-error-on"><span class="font-bold">'+t('notYetPaid')+' ('+unpaidList.length+'):</span> '+esc(unpaidList.join(', '))+'</div>';
        html+='</div>';
      });
      html+='</div>';}
    html+='</section>';
  });
  html+='</div>';return html;
}

    html+='<div class="col-span-1 md:col-span-4 flex items-center gap-3">'+(p.photoData?'<img src="'+p.photoData+'" class="w-10 h-10 rounded-lg object-cover shrink-0" onclick="event.stopPropagation();showLightbox(this.src)"/>':'<div class="w-10 h-10 rounded-full flex items-center justify-center text-sm font-bold shrink-0" style="background:'+bg+';color:'+fg+'">'+initials(p.en)+'</div>')+'<div><p class="text-sm font-semibold">'+esc(p.en)+'</p><p class="text-xs text-txt3 md:hidden">'+displayDate(p.covers||p.date)+'</p></div></div>';

  });

function handleMemberSubmit(e){
  e.preventDefault();var fd=new FormData(e.target);

  if(memberModal.mode==='edit'){
    db.collection('members').doc(memberModal.data.id).update(payload).then(closeMemberModal).catch(function(err){alert(err.message);});

    payload.order=members.length+1;
    db.collection('members').add(payload).then(closeMemberModal).catch(function(err){alert(err.message);});
  }

function doLogin(e){

function submitQuickPayment(e,en,vn){
  e.preventDefault();var fd=new FormData(e.target);
  var coversDate=fromInputDate(fd.get('covers'));
  var coversNorm=normDate(coversDate);
  var btn=e.target.querySelector('button[type=submit]');if(btn)btn.disabled=true;
  
  // Check for existing payment (prevent duplicate)
  var existing=payments.find(function(p){return p.en===en&&normDate(p.covers||p.date)===coversNorm;});
  if(existing){
    if(!confirm(en+' already paid '+fmt(existing.amount)+'d for '+displayDate(coversDate)+'. Add another payment?')){
      if(btn)btn.disabled=false;return;
    }
  }
  
  var payload={en:en,vn:vn,amount:parseInt(fd.get('amount'))||0,covers:coversDate,method:fd.get('method')||'Bank Transfer',date:today(),createdAt:new Date()};
  db.collection('payments').add(payload)
    .then(function(){closeQuickPayment();})
    .catch(function(err){alert(err.message);if(btn)btn.disabled=false;});
}

function handleSubmit(e){
  e.preventDefault();if(saving||compressing)return;saving=true;
  var fd=new FormData(e.target);var payload,coll;
  if(modal.type==='bill'){
    coll='bills';payload={date:fd.get('date'),total:parseInt(fd.get('total'))||0,note:fd.get('note')||''};
    // Collect member items
    var items=[];var sortedM=members.slice().sort(function(a,b){return(a.order||99)-(b.order||99)});
    sortedM.forEach(function(m,idx){
      var cb=document.querySelector('[data-mi="'+idx+'"]');
      if(cb&&cb.checked){
        var dish=fd.get('dish_'+idx)||'';var price=parseInt(fd.get('price_'+idx))||0;
        items.push({en:m.en,dish:dish,price:price});
      }
    });
    payload.items=items; // always save, empty array = no items
  }else{
    coll='payments';var parts=(fd.get('member')||'|').split('|');
    payload={en:parts[0],vn:parts[1]||'',amount:parseInt(fd.get('amount'))||0,covers:fromDateInput(fd.get('covers')),method:fd.get('method')||'Bank Transfer',date:fromDateInput(fd.get('date'))};
  }
  if(pendingPhoto)payload.photoData=pendingPhoto;
  else if(modal.mode==='edit'&&modal.data.photoData&&!pendingPhoto)payload.photoData=firebase.firestore.FieldValue.delete();
  renderModal();var op;
  if(modal.mode==='edit')op=db.collection(coll).doc(modal.data.id).update(payload);
  else{payload.createdAt=new Date();op=db.collection(coll).add(payload);}
  op.then(function(){saving=false;closeModal();}).catch(function(err){alert(err.message);saving=false;renderModal();});
}

/* ── Member item toggles ── */
function toggleMemberItem(idx){
  var cb=document.querySelector('[data-mi="'+idx+'"]');
  var fields=document.getElementById('mi-fields-'+idx);
  var card=document.getElementById('mi-'+idx);
  if(cb&&fields&&card){
    if(cb.checked){
      fields.classList.remove('hidden');
      card.style.border='2px solid #0066ff';
      card.style.background='rgba(0,102,255,.05)';
    }else{
      fields.classList.add('hidden');
      card.style.border='1px solid #d1d5db';
      card.style.background='#f9fafb';
    }
  }
  updateMemberCount();
}
function toggleAllMembers(checked){
  var cbs=document.querySelectorAll('[data-mi]');
  cbs.forEach(function(cb,idx){cb.checked=checked;toggleMemberItem(idx);});

function updateMemberCount(){
